  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 1. Memaksa elemen #root keluar dari wrapper Blogger ke body langsung
      const rootEl = document.getElementById('root');
      if (rootEl && rootEl.parentElement !== document.body) {
        document.body.appendChild(rootEl);
      }

      // 2. Inject Manifest via Data URI (MENGGUNAKAN LOGO DINAMIS)
      let iconUrl = "https://cdn-icons-png.flaticon.com/512/3135/3135810.png"; // Default
      try {
        const savedLogo = localStorage.getItem('savedSchoolLogo');
        if (savedLogo) {
          const srcMatch = savedLogo.match(/src\s*=\s*["']([^"']+)["']/);
          if (srcMatch) iconUrl = srcMatch[1];
          else if (savedLogo.trim().startsWith('http') || savedLogo.trim().startsWith('data:image')) iconUrl = savedLogo.trim();
        }
      } catch(e){}

      const manifestJSON = {
        "name": "E-Raport Qu",
        "short_name": "E-Raport",
        "start_url": location.href.split('?')[0],
        "display": "standalone",
        "background_color": "#0d5c3b",
        "theme_color": "#0d5c3b",
        "icons": [{
          "src": iconUrl,
          "sizes": "512x512",
          "type": "image/png",
          "purpose": "any maskable"
        }]
      };
      
      const manifestString = encodeURIComponent(JSON.stringify(manifestJSON));
      const manifestURI = 'data:application/json;charset=utf-8,' + manifestString;
      document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestURI}">`);

      // 3. Script Pembersih Navbar & Header Blogger secara paksa
      const forceCleanBlogger = () => {
        const junk = document.querySelectorAll('iframe[name="navbar"], #navbar-iframe, .Navbar, header, footer, #header, #sidebar, .sidebar-wrapper, .date-header, .post-title');
        junk.forEach(el => el && el.remove());
      };
      forceCleanBlogger();
      setTimeout(forceCleanBlogger, 1000); 
    });
  </script>

      if (!str) return '';

    function parseCSV(str) {
      const arr = []; let quote = false;
      for (let row = 0, col = 0, c = 0; c < str.length; c++) {
          let cc = str[c], nc = str[c+1];
          arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
          if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
          if (cc === '"') { quote = !quote; continue; }
          if (cc === ',' && !quote) { ++col; continue; }
          if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
          if (cc === '\n' && !quote) { ++row; col = 0; continue; }
          if (cc === '\r' && !quote) { ++row; col = 0; continue; }
          arr[row][col] += cc;
      }
      return arr;
    }

              if (json.data.guruRombelConfig) setGuruRombelConfig(json.data.guruRombelConfig);
              if (json.data.dimensiTarget) setDimensiTarget(json.data.dimensiTarget);
              if (json.data.kkmConfig) setKkmConfig(json.data.kkmConfig);
            }
          } catch (e) {
            console.error("Gagal load initial data", e);
          }
        };
        fetchInitialData();

        return () => window.removeEventListener('demo-toast', handleDemoToast);
      }, []);

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(null), 4000);
      };

      const showConfirm = (message, onConfirm) => {
        setConfirmDialog({ message, onConfirm });
      };

      const handleLogin = (role, nama, username) => {
        const sessionUser = { role, name: nama || (role === 'admin' ? (profilSekolah.kepalaSekolah || 'Admin Kepala Sekolah') : 'Guru'), username, isDemo: window.isDemoAccount };
        setUser(sessionUser);
        localStorage.setItem('eraportSession', JSON.stringify(sessionUser));
        setActiveMenu('dashboard');
      };

      const handleLogout = () => {
        localStorage.removeItem('eraportSession');
        window.isDemoAccount = false;
        setUser(null);
        setActiveMenu('dashboard');
      };

      const currentRombel = user?.role !== 'admin' ? guruRombelConfig[user?.username] : null;

      // Akses Data Siswa Lintas Guru (Semua Guru Bisa Lihat Sesuai Rombel yang Dipilih)
      const students = useMemo(() => {
        if (!user) return [];
        if (user.role === 'admin') return allStudents;
        if (!currentRombel) return [];
        return allStudents.filter(s => s.rombelSD === currentRombel);
      }, [user, allStudents, currentRombel]);

      const activeMapelList = user?.role === 'admin' 
        ? mapelList 
        : (currentRombel && guruMapelConfig[`${user.username}_${currentRombel}`] && guruMapelConfig[`${user.username}_${currentRombel}`].length > 0 
            ? guruMapelConfig[`${user.username}_${currentRombel}`] 
            : (guruMapelConfig[user?.username] || mapelList));

      const calculateNA = (mapel, studentId, mg = materiGuru, sg = studentGrades) => {
        const s = allStudents.find(x => x.id === studentId);
        const rombel = s ? s.rombelSD : '';
        const materiKey = rombel ? `${rombel}_${mapel}` : mapel;
        const materi = (mg[materiKey] || mg[mapel] || []).filter(isTujuanPembelajaran);
        
        const scores = (sg[mapel] || {})[studentId] || {};
        let totalM = 0, countM = 0;
        materi.forEach((m, idx) => {
          if(m.trim() !== '' && scores[`m${idx}`] !== undefined && scores[`m${idx}`] !== null) {
             totalM += scores[`m${idx}`]; countM++;
          }
        });
        if (countM === 0 && (scores.sts === undefined || scores.sts === null) && (scores.sas === undefined || scores.sas === null)) return null;
        const rataM = countM > 0 ? totalM / countM : 0;
        return parseFloat((((rataM) + (scores.sts||0) + (scores.sas||0)) / (countM > 0 ? 3 : ((scores.sts!==undefined&&scores.sts!==null) && (scores.sas!==undefined&&scores.sas!==null) ? 2 : 1))).toFixed(2));
      };

      const getPredikat = (nilai, config = kkmConfig) => {
        if(nilai === null || nilai === undefined || isNaN(nilai)) return '-';
        const n = parseFloat(nilai);
        if(n >= config.batasA) return 'A';
        if(n >= config.batasB) return 'B';
        if(n >= config.batasC) return 'C';
        return 'D';
      };

      const activeContext = { profil: profilSekolah, temaConfig, guruProfil, teachers, mapel: mapelList, ekskul: ekskulList, allStudents, materiGuru, lingkupMateriGuru, studentGrades, absensi, ekskulData, kokuData, guruMapelConfig, dimensiTarget, kkmConfig };

      if (!user) return (
        <div className="fixed inset-0 w-screen h-screen m-0 p-0 overflow-hidden z-[2147483647] bg-slate-50">

      const renderContent = () => {

                     <span className="bg-primaryLight text-primaryHover font-extrabold px-4 py-2 rounded-xl text-lg block border border-primary/20">"Tambahkan ke Layar Utama" <br/> (Add to Home Screen)</span>

    function LoginScreen({ onLogin, teachers, profil, temaConfig, onInstallClick }) {
      const [idAkses, setIdAkses] = useState('');

    function AdminDataGuru({ teachers, setTeachers, profil, showToast, showConfirm }) {
      const [csvUrl, setCsvUrl] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSyncGuru = async () => {
        setLoading(true);
        try {
          const res = await fetch(csvUrl);
          if(!res.ok) throw new Error("Gagal mengambil data");
          
          const text = await res.text();
          const rows = parseCSV(text);
          
          if (rows.length > 1) {
            const header = rows[0].map(h => h.trim().toUpperCase().replace(/[^A-Z0-9]/g, ''));
            const getCol = (hName) => header.findIndex(h => h.includes(hName.replace(/[^A-Z0-9]/g, '')));
            
            const iNama = getCol('NAMA');
            const iNip = getCol('NIP');
            const iWali = getCol('WALI');
            const iMapel = getCol('MAPEL');
            const iUser = getCol('USER');

            const parsed = rows.slice(1).map((row, idx) => {
              const gName = iNama !== -1 ? row[iNama] : `Guru ${idx+1}`;
              if (!gName || gName.trim() === '') return null;
              
              const gUsername = iUser !== -1 && row[iUser] ? row[iUser] : gName.split(' ')[0].toLowerCase() + (idx+1);

              return {
                id: `G-${Date.now()}-${idx}`,
                nama: gName.trim(),
                nip: iNip !== -1 ? row[iNip] : '-',
                waliKelas: iWali !== -1 ? row[iWali] : '-',
                mapel: iMapel !== -1 ? row[iMapel] : '-',
                username: gUsername.trim(),
              };
            }).filter(g => g !== null); 
            
            if (parsed.length > 0) {
              setTeachers(parsed);
              showToast(`Berhasil Sinkronisasi ${parsed.length} Data Guru!`);
              syncToCloud('teachers', parsed, profil.tahunAjaran);
            } else {
              throw new Error("Data kosong atau format salah");
            }
          }
        } catch (e) {
           console.error(e);
           showToast("Gagal menarik data. Pastikan link Google Sheets valid dan Publik (Cetak ke Web -> CSV).");
        }
        setLoading(false);
      };

      const deleteTeacher = (id) => {
        showConfirm('Yakin ingin menghapus data guru ini?', () => {
           const updated = teachers.filter(t => t.id !== id);
           setTeachers(updated);
           syncToCloud('teachers', updated, profil.tahunAjaran);
           showToast('Data guru berhasil dihapus!');
        });
      };

      return (
        <div className="space-y-6">
          <div className="bg-white/90 backdrop-blur-sm p-6 sm:p-8 rounded-[2rem] border border-slate-100 shadow-sm max-w-4xl">
            <div className="w-12 h-12 sm:w-16 sm:h-16 bg-blue-50 text-blue-600 rounded-xl sm:rounded-2xl flex items-center justify-center mb-4 sm:mb-6"><Users className="text-xl sm:text-2xl"/></div>
            <h2 className="font-extrabold text-xl sm:text-2xl text-slate-800 mb-2">Sinkronisasi Database Guru (CSV)</h2>
            <p className="text-slate-500 font-medium text-xs sm:text-sm mb-6 sm:mb-8">Membaca otomatis dari Google Sheets. Pastikan ada Header dengan tulisan <b>NAMA, NIP, WALI KELAS, MAPEL, USERNAME</b> (Akan dibaca otomatis di kolom berapapun).</p>
            
            <div className="flex flex-col md:flex-row gap-3 sm:gap-4 mb-4 sm:mb-6">
              <div className="flex-1 relative">
                 <LinkIcon className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm" />
                 <input type="text" className="w-full pl-10 pr-3 py-3 sm:py-4 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl text-xs sm:text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none" value={csvUrl} onChange={e=>setCsvUrl(e.target.value)} placeholder="Masukkan link Publikasi CSV Google Sheets..." />
              </div>
              <button onClick={handleSyncGuru} disabled={loading || !csvUrl} className="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 sm:px-8 py-3 sm:py-4 rounded-xl sm:rounded-2xl text-xs sm:text-sm font-bold shadow-md flex items-center justify-center gap-2 disabled:opacity-70 whitespace-nowrap">
                {loading ? <RefreshCw className="animate-spin" /> : <Download />}
                {loading ? 'Membaca Data...' : 'Sinkron Data Guru'}
              </button>
            </div>
          </div>

          <div className="bg-white/90 backdrop-blur-sm rounded-xl sm:rounded-3xl border border-slate-200 w-full overflow-hidden shadow-sm">
            <table className="w-full text-left text-[8px] sm:text-sm table-fixed break-words">
              <thead className="bg-slate-50 text-slate-600 font-extrabold border-b border-slate-200">
                <tr>

    function AdminDataSiswa({ allStudents, setAllStudents, profil, showToast }) {
      const [csvUrl, setCsvUrl] = useState("https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9NDKstrj0d9JH7PSMGc4X9ZP1JEarvqoXhF2BZcesqs52oW_jYNKd_fI832uYg/pub?gid=1632329455&single=true&output=csv");
      const [loading, setLoading] = useState(false);

      const handleSync = async () => {
        setLoading(true);
        try {
          const res = await fetch(csvUrl);
          if(!res.ok) throw new Error("Gagal mengambil data");
          
          const text = await res.text();
          const rows = parseCSV(text);
          
          if (rows.length > 1) {
            const header = rows[0].map(h => h.trim().toUpperCase().replace(/[^A-Z0-9]/g, ''));
            const getCol = (hName) => header.findIndex(h => h.includes(hName.replace(/[^A-Z0-9]/g, '')));
            const getColBy = (matcher) => header.findIndex(h => matcher(h));
            
            const iNama = getCol('NAMASISWA');
            const iNisn = getColBy(h => h === 'NISN' || h.includes('NISN') || h.includes('NASIONAL'));
            const iNis = getColBy(h => h === 'NIS' || (h.includes('NIS') && !h.includes('NISN')) || (h.includes('NOMORINDUK') && !h.includes('NASIONAL') && !h.includes('NISN')));
            const iRombel = getCol('ROMBELSD');
            const iTempatLahir = getCol('TEMPATTANGGALLAHIR');
            const iJK = getCol('JENISKELAMIN');
            const iNamaAyah = getCol('NAMAAYAH');
            const iNamaIbu = getCol('NAMAIBU');
            const iKerjaAyah = getCol('PEKERJAANAYAH');
            const iKerjaIbu = getCol('PEKERJAANIBU');
            const iDusun = getCol('DUSUN');
            const iDesa = getCol('DESA');
            const iKec = getCol('KECAMATAN');
            const iKab = getCol('KABUPATEN');
            const iAgama = getCol('AGAMA');

            const parsed = rows.slice(1).map((row, idx) => {
              const sName = iNama !== -1 ? row[iNama] : `Siswa ${idx+1}`;
              if (!sName || sName.trim() === '') return null;
              const nisnVal = iNisn !== -1 ? row[iNisn] : `00${idx}`;
              
              const existing = allStudents.find(old => old.nama === sName.trim() || old.nisn === nisnVal);
              const sId = existing ? existing.id : `S-${Date.now()}-${idx}`;

              return {
                id: sId,
                nama: sName.trim(),
                nisn: nisnVal,
                nis: iNis !== -1 ? row[iNis] : '-',
                rombelSD: iRombel !== -1 ? row[iRombel] : '-',
                tempatTanggalLahir: iTempatLahir !== -1 ? row[iTempatLahir] : '-',
                jenisKelamin: iJK !== -1 ? row[iJK] : '-',
                agama: iAgama !== -1 && row[iAgama] ? row[iAgama] : 'Islam',
                namaAyah: iNamaAyah !== -1 ? row[iNamaAyah] : '-',
                namaIbu: iNamaIbu !== -1 ? row[iNamaIbu] : '-',
                pekerjaanAyah: iKerjaAyah !== -1 ? row[iKerjaAyah] : '-',
                pekerjaanIbu: iKerjaIbu !== -1 ? row[iKerjaIbu] : '-',
                alamat: {
                  jalan: iDusun !== -1 ? row[iDusun] : '-',
                  desa: iDesa !== -1 ? row[iDesa] : '-',
                  kecamatan: iKec !== -1 ? row[iKec] : '-',
                  kabupaten: iKab !== -1 ? row[iKab] : '-',
                }
              };
            }).filter(s => s !== null); 
            
            if (parsed.length > 0) {
              setAllStudents(parsed);
              showToast(`Berhasil Sinkronisasi Master Data ${parsed.length} Siswa! Sistem pintar membaca header.`);
              syncToCloud('allStudents', parsed, profil.tahunAjaran);
            } else {
              throw new Error("Data kosong atau format salah");
            }
          }
        } catch (e) {
           console.error(e);
           showToast("Gagal menarik data. Pastikan link Google Sheets valid dan publik.");
        }
        setLoading(false);
      };
      
      return (
        <div className="bg-white/90 backdrop-blur-sm p-6 sm:p-8 rounded-[2rem] border border-slate-100 shadow-sm max-w-4xl">
          <div className="w-12 h-12 sm:w-16 sm:h-16 bg-blue-50 text-blue-600 rounded-xl sm:rounded-2xl flex items-center justify-center mb-4 sm:mb-6"><RefreshCw className="text-xl sm:text-2xl"/></div>
          <h2 className="font-extrabold text-xl sm:text-2xl text-slate-800 mb-2">Sinkronisasi Database Induk Siswa</h2>
          <p className="text-slate-500 font-medium text-xs sm:text-sm mb-6 sm:mb-8">Membaca otomatis dari Google Sheets. Posisi kolom bebas (Sistem membaca teks Header). Nanti Guru Wali akan menarik datanya berdasarkan Rombel SD.</p>
          
          <div className="flex flex-col md:flex-row gap-3 sm:gap-4 mb-4 sm:mb-6">
            <div className="flex-1 relative">
               <LinkIcon className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm" />
               <input type="text" className="w-full pl-10 pr-3 py-3 sm:py-4 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl text-xs sm:text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none" value={csvUrl} onChange={e=>setCsvUrl(e.target.value)} placeholder="https://docs.google.com/..." />
            </div>
            <button onClick={handleSync} disabled={loading} className="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 sm:px-8 py-3 sm:py-4 rounded-xl sm:rounded-2xl text-xs sm:text-sm font-bold shadow-md flex items-center justify-center gap-2 disabled:opacity-70 whitespace-nowrap">
              {loading ? <RefreshCw className="animate-spin" /> : <Download />}
              {loading ? 'Membaca Data...' : 'Sinkron & Simpan Master'}
            </button>
          </div>
        </div>
      );
    }

    function GuruInputNilai({ mapelList, materiGuru, studentGrades, setStudentGrades, students, calculateNA, currentRombel, profil, showToast, showConfirm }) {
      const [selectedMapel, setSelectedMapel] = useState(mapelList[0] || '');
      const grades = studentGrades[selectedMapel] || {};
      
      useEffect(() => {
        if (!selectedMapel && mapelList.length > 0) setSelectedMapel(mapelList[0]);
      }, [mapelList, selectedMapel]);

      const materiKey = currentRombel ? `${currentRombel}_${selectedMapel}` : selectedMapel;
      const currentMateriRaw = materiGuru[materiKey] || materiGuru[selectedMapel] || [];
      const currentMateri = currentMateriRaw.filter(isTujuanPembelajaran).map(stripMateriPrefix);

      const handleChange = (studentId, field, val) => {
        const valFloat = val === '' ? undefined : parseFloat(val);
        setStudentGrades(prev => ({
          ...prev, 
          [selectedMapel]: {
            ...(prev[selectedMapel] || {}),
            [studentId]: { ...((prev[selectedMapel] || {})[studentId] || {}), [field]: valFloat }
          }
        }));
      };

      const handleSave = () => {
        syncToCloud('studentGrades', studentGrades, profil.tahunAjaran);
        showToast(`Semua Nilai Akademik Mapel ${selectedMapel} Disimpan!`);
      };

      const handleReset = () => {
        showConfirm(`PERINGATAN! Yakin ingin KOSONGKAN/HAPUS seluruh nilai siswa pada mata pelajaran ${selectedMapel}? Data tidak dapat dikembalikan.`, () => {
          setStudentGrades(prev => {
            const updated = { ...prev };
            delete updated[selectedMapel];
            syncToCloud('studentGrades', updated, profil.tahunAjaran);
            return updated;
          });
          showToast(`Data Nilai ${selectedMapel} Berhasil Dihapus!`);
        });
      };

      const generateKeterangan = (s, studentGradesLocal) => {
        if (!studentGradesLocal || currentMateri.length === 0) return '';
        let maxVal = -1, minVal = 101, maxIdx = -1, minIdx = -1, countMateri = 0;
        currentMateri.forEach((mStr, idx) => {
          const val = studentGradesLocal[`m${idx}`];
          if (val !== undefined && !isNaN(val)) {
            if (val > maxVal) { maxVal = val; maxIdx = idx; }
            if (val < minVal) { minVal = val; minIdx = idx; }
            countMateri++;
          }
        });
        if (countMateri === 0) return '-';

        const cleanHigh = currentMateri[maxIdx];
        const cleanLow = currentMateri[minIdx];

        let ket = `Ananda menunjukkan pemahaman terhadap ${cleanHigh}.`;
        if (minVal < 70) {
          ket += ` Ananda masih perlu didampingi dan diingatkan tentang ${cleanLow}.`;
        } else if (maxIdx !== minIdx) {
          ket += ` Ananda dapat menyebutkan contoh perilaku dan penerapannya dalam ${cleanLow}.`;
        }
        return ket;
      };

      return (

      const savedConfig = kokuData[configKey] || {};
      const activeConfig = { ...DEFAULT_KOKU_CONFIG, ...savedConfig, dimensi: padArray(savedConfig.dimensi || dimensiTarget || DEFAULT_KOKU_CONFIG.dimensi, 3).slice(0, 3) };

      const handleUpdate = (id, field, val) => setKokuData(p => ({...p, [id]: {...(p[id]||{}), [field]: val}}));
      const handleConfigUpdate = (field, val) => {
        setKokuData(p => ({...p, [configKey]: { ...activeConfig, [field]: val }}));
      };
      const handleDimensiChange = (index, value) => {
        const newDimensi = [...activeConfig.dimensi];
        newDimensi[index] = value;
        setDimensiTarget(newDimensi);
        setKokuData(p => ({...p, [configKey]: { ...activeConfig, dimensi: newDimensi }}));

        const nextData = { ...kokuData, [configKey]: activeConfig };
        syncToCloud('kokuData', nextData, profil.tahunAjaran);
        syncToCloud('dimensiTarget', activeConfig.dimensi, profil.tahunAjaran);
        showToast('Penilaian Kokurikuler disimpan!');

        showConfirm('Yakin ingin KOSONGKAN seluruh data Penilaian Kokurikuler untuk rombel ini?', () => {
          setKokuData(prev => {

            students.forEach(s => delete updated[s.id]);

    function GuruLeger({ students, mapelList, calculateNA, profil, waliKelasName, showToast }) {

        let total = 0;
        let scores = {};
        mapelList.forEach(m => {
          let na = calculateNA(m, s.id) || 0;
          scores[m] = na;
          total += na;
        });
        let avg = mapelList.length > 0 ? (total / mapelList.length).toFixed(2) : 0;
        return { ...s, total, avg, scores };
      }).sort((a, b) => b.total - a.total); 

      legerData.forEach((s, i) => s.juara = i + 1);

      const htmlPrint = () => {
        const theadMapel = mapelList.map(m => `<th class="border border-black p-2 text-center text-xs w-10 rotate-180" style="background-color: #0d5c3b !important; color: white !important; -webkit-print-color-adjust: exact; writing-mode: vertical-rl;">${m}</th>`).join('');
        const tbodyRows = legerData.map((s, i) => {
          const mapelCols = mapelList.map(m => `<td class="border border-black p-2 text-center font-bold">${s.scores[m] ? s.scores[m].toFixed(2) : '-'}</td>`).join('');
          return `
            <tr>
              <td class="border border-black p-2 text-center">${i+1}</td>
              <td class="border border-black p-2 font-bold uppercase">${s.nama}</td>
              <td class="border border-black p-2 text-center">${s.nisn}</td>
              ${mapelCols}
              <td class="border border-black p-2 text-center bg-gray-100 font-bold" style="background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact;">${s.total.toFixed(2)}</td>
              <td class="border border-black p-2 text-center bg-gray-100 font-bold" style="background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact;">${s.avg}</td>

        return `

              <thead>
                <tr>
                  <th class="border border-black p-2 text-center w-8" style="background-color: #0d5c3b !important; color: white !important;">No</th>
                  <th class="border border-black p-2 text-center" style="background-color: #0d5c3b !important; color: white !important;">Nama Lengkap</th>

                  ${theadMapel}
                  <th class="border border-black p-2 text-center w-16" style="background-color: #0d5c3b !important; color: white !important;">Jumlah Nilai</th>
                  <th class="border border-black p-2 text-center w-16" style="background-color: #0d5c3b !important; color: white !important;">Rata-rata</th>
                  <th class="border border-black p-2 text-center w-12" style="background-color: #0d5c3b !important; color: white !important;">Juara</th>

      const handlePrint = () => {
        if(students.length === 0) { showToast('Siswa kosong, harap tarik/pilih Rombel terlebih dahulu'); return; }
        const win = window.open('', '_blank'); win.document.write(htmlPrint()); win.document.close();
      };

      return (
        <div className="bg-white/90 backdrop-blur-sm p-4 sm:p-8 rounded-[2rem] shadow-sm border border-slate-100">

                  <tr key={s.id} className="hover:bg-slate-50">
                    <td className="p-1 sm:px-4 sm:py-3 text-center text-slate-400 font-bold border-r">{i+1}</td>

    function GuruCetakRapor({ students, mapelList, calculateNA, profil, waliKelasName, waliKelasNip, kokuData, dimensiTarget, ekskulList, ekskulData, absensi, materiGuru, studentGrades, kkmConfig, temaConfig, showToast, allStudents }) {
      const [selectedStudent, setSelectedStudent] = useState('ALL');

      const extractKecamatan = (kecString) => {
         if(!kecString) return ''; return kecString.split(',')[0].trim();
      };

      const getStudentHTML = (s, isLast = false) => {
        let totalNa = 0;
        const properName = toProperCase(s.nama);
        const kelasSiswa = s.rombelSD || '-';
        const faseSiswa = getFase(kelasSiswa);
        
        const getKetMapel = (mapel, sId) => {
          const studentObj = allStudents.find(x => x.id === sId);
          const rombel = studentObj ? studentObj.rombelSD : '';
          const materiKey = rombel ? `${rombel}_${mapel}` : mapel;
          
          const materi = (materiGuru[materiKey] || materiGuru[mapel] || []).filter(isTujuanPembelajaran).map(stripMateriPrefix);
          const scores = (studentGrades[mapel] || {})[sId] || {};
          if(materi.length === 0) return `-`;
          
          let maxVal = -1, minVal = 101, maxIdx = -1, minIdx = -1;
          materi.forEach((_, idx) => {
            const val = scores[`m${idx}`];
            if (val !== undefined && val !== null && !isNaN(val)) {
              if (val > maxVal) { maxVal = val; maxIdx = idx; }
              if (val < minVal) { minVal = val; minIdx = idx; }
            }
          });
          if(maxIdx === -1) return `-`;
          
          const cleanHigh = materi[maxIdx];
          const cleanLow = materi[minIdx];

          let ket = `Ananda menunjukkan pemahaman terhadap ${cleanHigh}.`;
          if (minVal < 70) ket += `<br/>Ananda masih perlu didampingi dan diingatkan tentang ${cleanLow}.`;
          else if (maxIdx !== minIdx) ket += `<br/>Ananda dapat menyebutkan contoh perilaku dan penerapannya dalam ${cleanLow}.`;
          return ket;
        };

        let rows = mapelList.map((m, idx) => {
          let na = calculateNA(m, s.id);
          totalNa += (na || 0);
          let desc = getKetMapel(m, s.id);
          return `
          <tr>
            <td class="border border-black p-2 text-center align-top" style="vertical-align: top;">${idx+1}</td>
            <td class="border border-black p-2 align-top" style="vertical-align: top;">${m}</td>
            <td class="border border-black p-2 text-center font-bold text-base align-top" style="vertical-align: top;">${na !== null ? Math.round(na) : '-'}</td>

        let avgNum = parseFloat(rataRata);
        let dynamicCatatan = "";

        else if (avgNum >= 80) dynamicCatatan = `Prestasi belajar Ananda ${properName} sudah baik. Tingkatkan lagi fokus dan ketelitianmu agar hasilnya lebih maksimal.`;
        else if (avgNum >= (kkmConfig?.kkm || 70)) dynamicCatatan = `Ananda ${properName} telah mencapai ketuntasan. Mari tambah lagi waktu dan semangat belajarmu agar prestasimu semakin meningkat.`;
        else dynamicCatatan = `Ananda ${properName} membutuhkan bimbingan ekstra. Jangan patah semangat, teruslah rajin belajar dan berlatih dengan giat di rumah.`;

                 <p>NIP. ${formatDash(profil.nip)}</p>
               </div>
               <div class="text-center">
                 <p>${cetakKecamatan}, ${formatDash(profil.tanggalRaport)}</p>
                 <p class="font-bold">Wali Kelas</p>
                 <div style="height: 62px;"></div>
                 <p class="font-bold underline uppercase">${formatDash(waliKelasName)}</p>
                 <p>NIP. ${formatDash(waliKelasNip)}</p>
               </div>
            </div>
          </div>
        `;
      };

      const handlePrint = () => {
        let toPrint = selectedStudent === 'ALL' ? students : students.filter(s => s.id.toString() === selectedStudent);
        if(toPrint.length === 0) { showToast('Siswa kosong, harap tarik/pilih Rombel terlebih dahulu'); return; }
        
        const combinedHTML = `
          <html><head>
            <title>Cetak Rapor Baru</title>
            <scr`+`ipt src="https://cdn.tailwindcss.com"></scr`+`ipt>
            <style>
              .flex { display: flex; }
              .justify-between { justify-content: space-between; }
              .justify-end { justify-content: flex-end; }
              .grid { display: grid; }
              .grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
              .gap-6 { gap: 1.5rem; }
              .gap-8 { gap: 2rem; }
              .w-full { width: 100%; }
              .w-\\[45\\%\\] { width: 45%; }
              .w-\\[55\\%\\] { width: 55%; }
              .text-center { text-align: center; }
              .text-justify { text-align: justify; }
              .font-bold { font-weight: 700; }
              .uppercase { text-transform: uppercase; }
              .underline { text-decoration: underline; }
              .border { border-width: 1px; }
              .border-black { border-color: #000; }
              .inline-block { display: inline-block; }
              @media print { 
                 body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color: black; } 
                 table { page-break-inside: auto; }
                 tr { page-break-inside: avoid; page-break-after: auto; }
              }
            </style>
          </head><body class="font-sans text-black bg-white">
            ${toPrint.map((s, idx) => getStudentHTML(s, idx === toPrint.length - 1)).join('')}
            <scr`+`ipt>window.print();</scr`+`ipt>
          </body></html>
        `;
        const win = window.open('', '_blank'); win.document.open(); win.document.write(combinedHTML); win.document.close();
      };

      return (
        <div className="bg-white/90 backdrop-blur-sm p-6 sm:p-10 rounded-[2rem] border border-slate-100 shadow-sm max-w-2xl mx-auto text-center mt-6 sm:mt-10">
          <div className="w-16 h-16 sm:w-24 sm:h-24 bg-primaryLight rounded-2xl sm:rounded-[2rem] flex items-center justify-center mx-auto mb-4 sm:mb-6 text-primary"><Printer className="text-2xl sm:text-4xl"/></div>
          <h2 className="font-extrabold text-xl sm:text-2xl text-slate-800 mb-2">Cetak Dokumen Rapor</h2>
          <p className="text-slate-500 font-medium text-xs sm:text-sm mb-6 sm:mb-8">Dokumen dicetak menggunakan format Rapor Merdeka terbaru.</p>
          
          <select className="w-full p-3 sm:p-4 border border-slate-200 rounded-xl sm:rounded-2xl mb-6 sm:mb-8 outline-none focus:ring-2 focus:ring-primary font-bold text-slate-700 bg-slate-50 text-xs sm:text-sm" value={selectedStudent} onChange={e=>setSelectedStudent(e.target.value)}>
            <option value="ALL">Cetak Semua Siswa ({students.length} Siswa)</option>
            {students.map(s => <option key={s.id} value={s.id}>{s.nama}</option>)}
          </select>
          
          <button onClick={handlePrint} className="bg-primary hover:bg-primaryHover text-white px-6 sm:px-10 py-3 sm:py-4 rounded-xl sm:rounded-2xl font-bold text-sm sm:text-lg w-full shadow-xl flex items-center justify-center gap-3 transition-all"><ExternalLink /> Buka & Cetak Dokumen</button>
        </div>
      );
    }

    function GuruCetakSampul({ students, profil, showToast }) {
      const [selectedStudent, setSelectedStudent] = useState('ALL');

      const fv = (val) => {
        if (!val || val === '0' || String(val).trim() === '') return '-';
        return val;
      };

      const getSampulHTML = (s, isLast = false) => {
        const cetakKecamatan = profil.kecamatan ? profil.kecamatan.split(',')[0].trim() : '';
        const safeLogo = profil.logo ? cleanLogoUrl(profil.logo).replace(/"/g, '') : '';
        const nis = fv(s.nis);
        const nisn = fv(s.nisn);

        return `
          <!-- SAMPUL 1 (COVER DEPAN) -->
          <section style="page-break-after: always; padding: 18mm 20mm; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 255mm; text-align: center; box-sizing: border-box;">
             ${safeLogo ? `<img src="${safeLogo}" style="width: 180px; height: 180px; margin-bottom: 25px; object-fit: contain;" />` : ''}
             <h1 style="font-size: 28px; font-weight: bold; margin-bottom: 5px; margin-top: 10px;">LAPORAN</h1>
             <h2 style="font-size: 24px; font-weight: bold; margin-bottom: 5px;">HASIL CAPAIAN PESERTA DIDIK</h2>
             <h2 style="font-size: 24px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase;">${profil.namaSekolah}</h2>
             <p style="font-size: 16px; margin-bottom: 2px;">NPSN : ${fv(profil.npsn)}</p>
             <p style="font-size: 14px; margin-bottom: 15px; width: 60%; text-align: center;">Alamat : ${fv(profil.alamat)}</p>
             
             <p style="font-size: 14px; font-weight: bold; margin-top: 60px; margin-bottom: 10px;">Nama Peserta Didik</p>
             <div style="border: 2px solid black; padding: 15px 40px; font-size: 20px; font-weight: bold; margin-bottom: 30px; min-width: 400px; text-transform: uppercase;">
                ${s.nama}
             </div>

             <p style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">NIS / NISN</p>
             <div style="border: 2px solid black; padding: 15px 40px; font-size: 20px; font-weight: bold; min-width: 400px;">
                ${nis} / ${nisn}
             </div>
          </section>

          <!-- SAMPUL 2 (IDENTITAS PESERTA DIDIK) -->
          <section style="page-break-after: ${isLast ? 'auto' : 'always'}; padding: 15mm; font-family: 'Times New Roman', serif; font-size: 13px; position: relative; min-height: 255mm; box-sizing: border-box;">
             <h2 style="text-align: center; font-style: italic; font-weight: bold; text-decoration: underline; margin-bottom: 20px; font-size: 16px;">IDENTITAS PESERTA DIDIK</h2>
             
             <table style="width: 100%; line-height: 2; border-collapse: collapse;">
                <tr><td style="width: 35%;">1. Nama Peserta Didik</td><td style="width: 2%;">:</td><td style="text-transform: uppercase;"><b>${fv(s.nama)}</b></td></tr>
                <tr><td>2. Nomor Induk / NISN</td><td>:</td><td>${nis} / ${nisn}</td></tr>
                <tr><td>3. Tempat, Tanggal Lahir</td><td>:</td><td style="text-transform: uppercase;">${fv(s.tempatTanggalLahir)}</td></tr>
                <tr><td>4. Jenis Kelamin</td><td>:</td><td>${fv(s.jenisKelamin)}</td></tr>
                <tr><td>5. Agama</td><td>:</td><td style="text-transform: uppercase;">${fv(s.agama)}</td></tr>
                <tr><td>6. Pendidikan Sebelumnya</td><td>:</td><td>${fv(s.pendidikanSebelumnya)}</td></tr>
                <tr><td style="vertical-align: top;">7. Alamat Peserta Didik</td><td style="vertical-align: top;">:</td><td style="text-transform: uppercase;">${fv(s.alamat?.jalan)}, ${fv(s.alamat?.desa)}, KEC. ${fv(s.alamat?.kecamatan)}, ${fv(s.alamat?.kabupaten)}</td></tr>
                <tr><td colspan="3" style="padding-top: 5px;">8. Nama Orang Tua</td></tr>
                <tr><td style="padding-left: 20px; font-weight: bold;">a. Ayah</td><td>:</td><td style="text-transform: uppercase;">${fv(s.namaAyah)}</td></tr>
                <tr><td style="padding-left: 20px; font-weight: bold;">b. Ibu</td><td>:</td><td style="text-transform: uppercase;">${fv(s.namaIbu)}</td></tr>
                <tr><td colspan="3" style="padding-top: 5px;">9. Pekerjaan Orang Tua</td></tr>
                <tr><td style="padding-left: 20px; font-weight: bold;">a. Ayah</td><td>:</td><td style="text-transform: uppercase;">${fv(s.pekerjaanAyah)}</td></tr>
                <tr><td style="padding-left: 20px; font-weight: bold;">b. Ibu</td><td>:</td><td style="text-transform: uppercase;">${fv(s.pekerjaanIbu)}</td></tr>
             </table>

             <div style="display: flex; justify-content: flex-end; align-items: flex-end; margin-top: 25px; padding-right: 20px;">
                <div style="width: 250px; text-align: center;">
                   <p style="margin-bottom: 5px;">${cetakKecamatan}, ${profil.tanggalRaport}</p>
                   <p style="margin-bottom: 3cm; font-weight: bold;">Kepala Sekolah</p>
                   <p style="font-weight: bold; text-decoration: underline; text-transform: uppercase;">${profil.kepalaSekolah}</p>
                </div>
             </div>
          </section>
        `;
      };

      const handlePrint = () => {
        let toPrint = selectedStudent === 'ALL' ? students : students.filter(s => s.id.toString() === selectedStudent);
        if(toPrint.length === 0) { showToast('Siswa kosong, harap tarik/pilih Rombel terlebih dahulu'); return; }
        
        const combinedHTML = `
          <html><head>
            <title>Cetak Sampul</title>
            <style>
              @page { size: A4; margin: 15mm; }
              @media print { 
                 body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; } 
              }
            </style>
          </head><body style="margin: 0; padding: 0;">
            ${toPrint.map((s, idx) => getSampulHTML(s, idx === toPrint.length - 1)).join('')}
            <scr`+`ipt>window.print();</scr`+`ipt>
          </body></html>
        `;
        const win = window.open('', '_blank'); win.document.open(); win.document.write(combinedHTML); win.document.close();
      };

      return (
        <div className="bg-white/90 backdrop-blur-sm p-6 sm:p-10 rounded-[2rem] border border-slate-100 shadow-sm max-w-2xl mx-auto text-center mt-6 sm:mt-10">
          <div className="w-16 h-16 sm:w-24 sm:h-24 bg-blue-50 rounded-2xl sm:rounded-[2rem] flex items-center justify-center mx-auto mb-4 sm:mb-6 text-blue-600"><FileBadge className="text-2xl sm:text-4xl"/></div>
          <h2 className="font-extrabold text-xl sm:text-2xl text-slate-800 mb-2">Cetak Sampul Rapor</h2>
          <p className="text-slate-500 font-medium text-xs sm:text-sm mb-6 sm:mb-8">Otomatis mencetak Cover (Sampul 1) dan Identitas Biodata Lengkap (Sampul 2) per siswa.</p>
          
          <select className="w-full p-3 sm:p-4 border border-slate-200 rounded-xl sm:rounded-2xl mb-6 sm:mb-8 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 bg-slate-50 text-xs sm:text-sm" value={selectedStudent} onChange={e=>setSelectedStudent(e.target.value)}>
            <option value="ALL">Cetak Semua Siswa ({students.length} Siswa)</option>
            {students.map(s => <option key={s.id} value={s.id}>{s.nama}</option>)}
          </select>
          
          <button onClick={handlePrint} className="bg-blue-600 hover:bg-blue-700 text-white px-6 sm:px-10 py-3 sm:py-4 rounded-xl sm:rounded-2xl font-bold text-sm sm:text-lg w-full shadow-xl flex items-center justify-center gap-3 transition-all"><ExternalLink /> Buka & Cetak Sampul</button>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
