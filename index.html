<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-hidden">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    window.isDemoAccount = false;

    // --- PEMETAAN IKON ---
    const Icon = ({ name, className, title, onClick }) => <i className={`fas ${name} ${className || ''}`} title={title} onClick={onClick}></i>;
    const Home = (p) => <Icon name="fa-home" {...p} />;
    const Users = (p) => <Icon name="fa-users" {...p} />;
    const BookOpen = (p) => <Icon name="fa-book-open" {...p} />;
    const Printer = (p) => <Icon name="fa-print" {...p} />;
    const Settings = (p) => <Icon name="fa-cog" {...p} />;
    const LogOut = (p) => <Icon name="fa-sign-out-alt" {...p} />;
    const Search = (p) => <Icon name="fa-search" {...p} />;
    const Plus = (p) => <Icon name="fa-plus" {...p} />;
    const Save = (p) => <Icon name="fa-save" {...p} />;
    const FileText = (p) => <Icon name="fa-file-alt" {...p} />;
    const CheckCircle2 = (p) => <Icon name="fa-check-circle" {...p} />;
    const MenuIcon = (p) => <Icon name="fa-bars" {...p} />;
    const FileSpreadsheet = (p) => <Icon name="fa-file-excel" {...p} />;
    const Activity = (p) => <Icon name="fa-chart-line" {...p} />;
    const Building = (p) => <Icon name="fa-building" {...p} />;
    const Download = (p) => <Icon name="fa-download" {...p} />;
    const ClipboardList = (p) => <Icon name="fa-clipboard-list" {...p} />;
    const GraduationCap = (p) => <Icon name="fa-graduation-cap" {...p} />;
    const LinkIcon = (p) => <Icon name="fa-link" {...p} />;
    const RefreshCw = (p) => <Icon name="fa-sync-alt" {...p} />;
    const ExternalLink = (p) => <Icon name="fa-external-link-alt" {...p} />;
    const Trash2 = (p) => <Icon name="fa-trash-alt" {...p} />;
    const PieChart = (p) => <Icon name="fa-chart-pie" {...p} />;
    const Filter = (p) => <Icon name="fa-filter" {...p} />;
    const FileBadge = (p) => <Icon name="fa-id-badge" {...p} />;
    const Palette = (p) => <Icon name="fa-palette" {...p} />;
    const UserIcon = (p) => <Icon name="fa-user-circle" {...p} />;
    const LockIcon = (p) => <Icon name="fa-lock" {...p} />;
    const Bullhorn = (p) => <Icon name="fa-bullhorn" {...p} />;
    const Trophy = (p) => <Icon name="fa-trophy" {...p} />;
    const Clock = (p) => <Icon name="fa-clock" {...p} />;
    const Signature = (p) => <Icon name="fa-file-signature" {...p} />;

    // === KONFIGURASI BACKEND GOOGLE APPS SCRIPT ===
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxbO2Fi5EnZFuNcbLdkhQAg4nXHv_Ob7pcv0MmI6ZbQeNd-TOR0fMIhAbJB78W1lqM/exec";

    const syncToCloud = async (key, payload, tahunAjaran) => {
      if (window.isDemoAccount) {
        window.dispatchEvent(new CustomEvent('demo-toast', { detail: "Akun Demo Aktif: Hanya mode baca." }));
        return;
      }
      try {
        const formattedTahunAjaran = tahunAjaran ? tahunAjaran.replace(/\//g, '_').replace(/ /g, '') : '2025_2026';
        await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'save', key, payload, tahunAjaran: `Tahun_${formattedTahunAjaran}` })
        });
      } catch (error) { console.error(`[Cloud Sync Failed] Key: ${key}`, error); }
    };

    const cleanLogoUrl = (input) => {
      if (!input) return '';
      const srcMatch = input.match(/src\s*=\s*["']([^"']+)["']/);
      if (srcMatch) return srcMatch[1];
      return input.replace(/<[^>]*>?/gm, '').trim(); 
    };

    const INITIAL_PROFIL = { namaSekolah: '', motto: '', npsn: '', kepalaSekolah: '', nip: '', semester: '1 (SATU)', tahunAjaran: '2025/2026', tanggalRaport: '', kecamatan: '', alamat: '', logo: '' };
    const INITIAL_TEMA = { colorTheme: 'hijau', adminPhoto: '', useWatermark: true, watermarkOpacity: 15, tableHeaderBg: '#d1d5db', tableHeaderTxt: '#1f2937' };
    const INITIAL_APP_CONFIG = { deadline: '', isLocked: false, lockMessage: 'Waktu pengisian rapor telah berakhir.', broadcastMessage: '' };
    const INITIAL_TEACHERS = [];
    const INITIAL_MAPEL = [];
    const INITIAL_EKSKUL = [];
    const DIMENSI_P5 = ['Keimanan dan ketaqwaan kepada Tuhan yang Maha Esa', 'Kewargaan', 'Penalaran kritis', 'Kreativitas', 'Kolaborasi', 'Kemandirian', 'Kesehatan', 'Komunikasi'];
    const INITIAL_KKM = { kkm: 70, batasA: 90, batasB: 80, batasC: 70 };

    const COLOR_THEMES = {
      hijau: { primary: '#0d5c3b', primaryHover: '#064e3b', primaryLight: '#ecfdf5' },
      biru: { primary: '#1d4ed8', primaryHover: '#1e3a8a', primaryLight: '#eff6ff' },
      ungu: { primary: '#6d28d9', primaryHover: '#4c1d95', primaryLight: '#f5f3ff' },
      merah: { primary: '#e11d48', primaryHover: '#9f1239', primaryLight: '#fff1f2' }
    };

    const toProperCase = (str) => {
      if (!str) return '';
      return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
    };

    function parseCSV(str) {
      const arr = []; let quote = false;
      for (let row = 0, col = 0, c = 0; c < str.length; c++) {
          let cc = str[c], nc = str[c+1];
          arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
          if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
          if (cc === '"') { quote = !quote; continue; }
          if (cc === ',' && !quote) { ++col; continue; }
          if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
          if (cc === '\n' && !quote) { ++row; col = 0; continue; }
          if (cc === '\r' && !quote) { ++row; col = 0; continue; }
          arr[row][col] += cc;
      }
      return arr;
    }

    // Hook Hitung Mundur
    function useCountdown(deadlineStr) {
      const [timeLeft, setTimeLeft] = useState('');
      const [isExpired, setIsExpired] = useState(false);

      useEffect(() => {
        if(!deadlineStr) { setTimeLeft(''); setIsExpired(false); return; }
        
        const timer = setInterval(() => {
          const now = new Date().getTime();
          const dest = new Date(deadlineStr).getTime();
          const dist = dest - now;

          if(dist <= 0) { 
            setTimeLeft('00h 00j 00m 00d'); 
            setIsExpired(true);
            clearInterval(timer); 
            return; 
          }
          
          setIsExpired(false);
          const d = Math.floor(dist / (1000 * 60 * 60 * 24));
          const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
          const s = Math.floor((dist % (1000 * 60)) / 1000);
          
          let res = [];
          if(d > 0) res.push(`${d} Hari`);
          res.push(`${h} Jam`);
          res.push(`${m} Menit`);
          res.push(`${s} Detik`);
          
          setTimeLeft(res.join(' '));
        }, 1000);
        return () => clearInterval(timer);
      }, [deadlineStr]);

      return { timeLeft, isExpired };
    }

    // --- KOMPONEN UTAMA (App) ---
    function App() {
      const [isAppLoading, setIsAppLoading] = useState(true);
      const [loadingProgress, setLoadingProgress] = useState(0); 
      const [user, setUser] = useState(null); 
      const [activeMenu, setActiveMenu] = useState('dashboard');
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [toastMessage, setToastMessage] = useState(null);

      const [profilSekolah, setProfilSekolah] = useState(INITIAL_PROFIL);
      const [temaConfig, setTemaConfig] = useState(INITIAL_TEMA);
      const [appConfig, setAppConfig] = useState(INITIAL_APP_CONFIG);
      const [guruProfil, setGuruProfil] = useState({});
      const [teachers, setTeachers] = useState(INITIAL_TEACHERS);
      const [mapelList, setMapelList] = useState(INITIAL_MAPEL);
      const [ekskulList, setEkskulList] = useState(INITIAL_EKSKUL);
      const [allStudents, setAllStudents] = useState([]); 
      
      const [materiGuru, setMateriGuru] = useState({}); 
      const [studentGrades, setStudentGrades] = useState({}); 
      const [absensi, setAbsensi] = useState({}); 
      const [ekskulData, setEkskulData] = useState({}); 
      const [kokuData, setKokuData] = useState({}); 
      const [guruMapelConfig, setGuruMapelConfig] = useState({}); 
      const [guruRombelConfig, setGuruRombelConfig] = useState({}); 
      const [dimensiTarget, setDimensiTarget] = useState([DIMENSI_P5[0], DIMENSI_P5[5], DIMENSI_P5[3]]);
      const [kkmConfig, setKkmConfig] = useState(INITIAL_KKM);

      const [confirmDialog, setConfirmDialog] = useState(null);

      useEffect(() => {
         const t = COLOR_THEMES[temaConfig.colorTheme] || COLOR_THEMES.hijau;
         document.documentElement.style.setProperty('--color-primary', t.primary);
         document.documentElement.style.setProperty('--color-primary-hover', t.primaryHover);
         document.documentElement.style.setProperty('--color-primary-light', t.primaryLight);
      }, [temaConfig.colorTheme]);

      useEffect(() => {
        const handleDemoToast = (e) => showToast(e.detail);
        window.addEventListener('demo-toast', handleDemoToast);

        const fetchInitialData = async () => {
          let progress = 0;
          const animInterval = setInterval(() => {
             progress += Math.floor(Math.random() * 8) + 2;
             if(progress > 90) progress = 90;
             setLoadingProgress(progress);
          }, 300);

          try {
            const activeYear = localStorage.getItem('activeTahunAjaran') || '2025_2026';
            const res = await fetch(GAS_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'loadAll', tahunAjaran: `Tahun_${activeYear}` })
            });
            const json = await res.json();
            
            if (json.status === 'success' && json.data) {
              if (json.data.profil) setProfilSekolah(json.data.profil);
              if (json.data.temaConfig) setTemaConfig(json.data.temaConfig);
              if (json.data.appConfig) setAppConfig(json.data.appConfig);
              if (json.data.guruProfil) setGuruProfil(json.data.guruProfil);
              if (json.data.teachers) setTeachers(json.data.teachers);
              if (json.data.mapel) setMapelList(json.data.mapel);
              if (json.data.ekskul) setEkskulList(json.data.ekskul);
              if (json.data.allStudents) setAllStudents(json.data.allStudents);
              if (json.data.materiGuru) setMateriGuru(json.data.materiGuru);
              if (json.data.studentGrades) setStudentGrades(json.data.studentGrades);
              if (json.data.absensi) setAbsensi(json.data.absensi);
              if (json.data.ekskulData) setEkskulData(json.data.ekskulData);
              if (json.data.kokuData) setKokuData(json.data.kokuData);
              if (json.data.guruMapelConfig) setGuruMapelConfig(json.data.guruMapelConfig);
              if (json.data.guruRombelConfig) setGuruRombelConfig(json.data.guruRombelConfig);
              if (json.data.dimensiTarget) setDimensiTarget(json.data.dimensiTarget);
              if (json.data.kkmConfig) setKkmConfig(json.data.kkmConfig);
            }
          } catch (e) {
            console.error("Gagal load initial data", e);
          } finally {
            clearInterval(animInterval);
            setLoadingProgress(100);
            setTimeout(() => setIsAppLoading(false), 800); 
          }
        };
        fetchInitialData();
        return () => window.removeEventListener('demo-toast', handleDemoToast);
      }, []);

      const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 3500); };
      const showConfirm = (message, onConfirm) => { setConfirmDialog({ message, onConfirm }); };

      const handleLogin = (role, nama, username) => {
        setUser({ role, name: nama || (role === 'admin' ? (profilSekolah.kepalaSekolah || 'Admin Kepala Sekolah') : 'Guru'), username });
        setActiveMenu('dashboard');
      };

      // Cek Status Kunci Aplikasi
      const { isExpired: timeIsUp } = useCountdown(appConfig.deadline);
      const isAppLocked = appConfig.isLocked || timeIsUp;

      const students = useMemo(() => {
        if (!user) return [];
        if (user.role === 'admin') return allStudents;
        const rombel = guruRombelConfig[user.username];
        if (!rombel) return [];
        return allStudents.filter(s => s.rombelSD === rombel);
      }, [user, allStudents, guruRombelConfig]);

      const activeMapelList = user?.role === 'admin' 
        ? mapelList 
        : (guruMapelConfig[user?.username] && guruMapelConfig[user?.username].length > 0 
            ? guruMapelConfig[user?.username] 
            : mapelList);

      const calculateNA = (mapel, studentId, mg = materiGuru, sg = studentGrades) => {
        const materi = mg[mapel] || [];
        const scores = (sg[mapel] || {})[studentId] || {};
        let totalM = 0, countM = 0;
        materi.forEach((m, idx) => {
          if(m.trim() !== '' && scores[`m${idx}`] !== undefined && scores[`m${idx}`] !== null) {
             totalM += scores[`m${idx}`]; countM++;
          }
        });
        if (countM === 0 && (scores.sts === undefined || scores.sts === null) && (scores.sas === undefined || scores.sas === null)) return null;
        const rataM = countM > 0 ? totalM / countM : 0;
        return parseFloat((((rataM) + (scores.sts||0) + (scores.sas||0)) / (countM > 0 ? 3 : ((scores.sts!==undefined&&scores.sts!==null) && (scores.sas!==undefined&&scores.sas!==null) ? 2 : 1))).toFixed(2));
      };

      const getPredikat = (nilai, config = kkmConfig) => {
        if(nilai === null || nilai === undefined || isNaN(nilai)) return '-';
        const n = parseFloat(nilai);
        if(n >= config.batasA) return 'A';
        if(n >= config.batasB) return 'B';
        if(n >= config.batasC) return 'C';
        return 'D';
      };

      if (isAppLoading) {
        return (
          <div className="fixed inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center p-6 text-center">
            {profilSekolah.logo ? (
              <img src={cleanLogoUrl(profilSekolah.logo)} className="w-32 h-32 mb-8 object-contain drop-shadow-xl animate-pulse" alt="Logo Sekolah" />
            ) : (
              <GraduationCap className="w-24 h-24 text-primary mb-8 animate-pulse text-6xl" />
            )}
            <div className="w-full max-w-sm h-6 bg-slate-200 rounded-full overflow-hidden mb-4 shadow-inner relative">
               <div className="h-full bg-gradient-to-r from-emerald-500 to-primary transition-all duration-300 ease-out flex items-center justify-end pr-3" style={{width: `${loadingProgress}%`}}>
                  {loadingProgress > 10 && <span className="text-xs text-white font-bold">{loadingProgress}%</span>}
               </div>
            </div>
            <h2 className="text-2xl font-extrabold text-slate-800 tracking-tight mb-2">Memuat Database E-Raport Qu...</h2>
            <p className="text-sm font-bold text-slate-500 mt-4 bg-primaryLight px-4 py-2 rounded-full border border-primary/20">Version 1.0 by Amal Khairi, S.Pd., Gr.</p>
          </div>
        );
      }

      const activeContext = { profil: profilSekolah, temaConfig, appConfig, guruProfil, teachers, mapel: mapelList, ekskul: ekskulList, allStudents, materiGuru, studentGrades, absensi, ekskulData, kokuData, guruMapelConfig, dimensiTarget, kkmConfig };

      if (!user) return <LoginScreen onLogin={handleLogin} teachers={teachers} profil={profilSekolah} temaConfig={temaConfig} />;

      const renderContent = () => {
        if (user.role === 'admin') {
          switch (activeMenu) {
            case 'dashboard': return <AdminDashboard teachers={teachers} students={allStudents} />;
            case 'data_guru': return <AdminDataGuru teachers={teachers} setTeachers={setTeachers} profil={profilSekolah} showToast={showToast} showConfirm={showConfirm} />;
            case 'master_mapel': return <AdminMasterMapel mapel={mapelList} setMapel={setMapelList} ekskul={ekskulList} setEkskul={setEkskulList} profil={profilSekolah} showToast={showToast} />;
            case 'kkm_nilai': return <AdminKKM kkmConfig={kkmConfig} setKkmConfig={setKkmConfig} profil={profilSekolah} showToast={showToast} />;
            case 'data_siswa': return <AdminDataSiswa allStudents={allStudents} setAllStudents={setAllStudents} profil={profilSekolah} showToast={showToast} teachers={teachers} />;
            case 'profil': return <AdminProfil profil={profilSekolah} setProfil={setProfilSekolah} showToast={showToast} />;
            case 'pengaturan_tema': return <AdminPengaturanTema temaConfig={temaConfig} setTemaConfig={setTemaConfig} profil={profilSekolah} showToast={showToast} />;
            case 'pengaturan_akses': return <AdminPengaturanAkses appConfig={appConfig} setAppConfig={setAppConfig} profil={profilSekolah} showToast={showToast} />;
            case 'progress_guru': return <AdminProgressGuru teachers={teachers} students={allStudents} mapelList={mapelList} studentGrades={studentGrades} materiGuru={materiGuru} calculateNA={calculateNA} />;
            case 'leger_admin': return <AdminPrintFilter defaultContext={activeContext} showToast={showToast} renderComponent={(filtered, rombel, waliName, ctx, printProfil) => <GuruLeger students={filtered} mapelList={ctx.mapel} calculateNA={(m, id) => calculateNA(m, id, ctx.materiGuru, ctx.studentGrades)} profil={printProfil} waliKelasName={waliName} showToast={showToast} />} />;
            case 'cetak_rapor_admin': return <AdminPrintFilter defaultContext={activeContext} showToast={showToast} renderComponent={(filtered, rombel, waliName, ctx, printProfil) => <GuruCetakRapor students={filtered} mapelList={ctx.mapel} teachers={ctx.teachers} calculateNA={(m, id) => calculateNA(m, id, ctx.materiGuru, ctx.studentGrades)} getPredikat={(n) => getPredikat(n, ctx.kkmConfig)} profil={printProfil} waliKelasName={waliName} kokuData={ctx.kokuData} dimensiTarget={ctx.dimensiTarget} ekskulList={ctx.ekskul} ekskulData={ctx.ekskulData} absensi={ctx.absensi} materiGuru={ctx.materiGuru} studentGrades={ctx.studentGrades} kkmConfig={ctx.kkmConfig} temaConfig={ctx.temaConfig} showToast={showToast} />} />;
            case 'cetak_sampul_admin': return <AdminPrintFilter defaultContext={activeContext} showToast={showToast} renderComponent={(filtered, rombel, waliName, ctx, printProfil) => <GuruCetakSampul students={filtered} profil={printProfil} temaConfig={ctx.temaConfig} showToast={showToast} />} />;
            case 'cetak_admin': return <AdminCetakAdministrasi activeContext={activeContext} calculateNA={calculateNA} showToast={showToast} />;
            default: return <AdminDashboard teachers={teachers} students={allStudents} />;
          }
        } else {
          switch (activeMenu) {
            case 'dashboard': return <GuruDashboard user={user} students={students} mapelList={activeMapelList} studentGrades={studentGrades} calculateNA={calculateNA} appConfig={appConfig} />;
            case 'profil_guru': return <GuruProfil guruProfil={guruProfil} setGuruProfil={setGuruProfil} username={user.username} profil={profilSekolah} showToast={showToast} />;
            case 'pengaturan_mapel': return <GuruPengaturanMapel mapelList={mapelList} activeMapelList={activeMapelList} setGuruMapelConfig={setGuruMapelConfig} username={user.username} profil={profilSekolah} showToast={showToast} isAppLocked={isAppLocked} appConfig={appConfig} />;
            case 'tarik_siswa': return <GuruTarikSiswa allStudents={allStudents} guruRombelConfig={guruRombelConfig} setGuruRombelConfig={setGuruRombelConfig} username={user.username} profil={profilSekolah} teachers={teachers} showToast={showToast} isAppLocked={isAppLocked} appConfig={appConfig} />;
            case 'input_materi': return <GuruInputMateri mapelList={activeMapelList} materiGuru={materiGuru} setMateriGuru={setMateriGuru} profil={profilSekolah} showToast={showToast} isAppLocked={isAppLocked} appConfig={appConfig} />;
            case 'input_nilai': return <GuruInputNilai mapelList={activeMapelList} materiGuru={materiGuru} studentGrades={studentGrades} setStudentGrades={setStudentGrades} students={students} calculateNA={calculateNA} profil={profilSekolah} showToast={showToast} showConfirm={showConfirm} isAppLocked={isAppLocked} appConfig={appConfig} />;
            case 'input_absensi': return <GuruInputAbsensi students={students} absensi={absensi} setAbsensi={setAbsensi} profil={profilSekolah} showToast={showToast} showConfirm={showConfirm} isAppLocked={isAppLocked} appConfig={appConfig} />;

    function AdminDataGuru({ teachers, setTeachers, profil, showToast, showConfirm }) {
      const [pasteData, setPasteData] = useState('');
      const [showPaste, setShowPaste] = useState(false);
      const [csvUrl, setCsvUrl] = useState('');
      const [loadingCsv, setLoadingCsv] = useState(false);

      const handlePasteSubmit = () => {
        try {
          const rows = pasteData.split('\n').filter(r => r.trim() !== '');
          const newTeachers = rows.map((row, index) => {
            const cols = row.split('\t'); 
            return {
              id: Date.now() + index,
              nama: cols[1] || 'Tanpa Nama',
              nip: cols[2] || '-',
              waliKelas: cols[3] || '-',
              mapel: cols[4] || '-',
              username: cols[5] || 'user',
              ket: cols[6] || 'Aktif'
            };
          });
          const updatedList = [...teachers, ...newTeachers];
          setTeachers(updatedList);
          syncToCloud('teachers', updatedList, profil.tahunAjaran);
          setShowPaste(false); setPasteData(''); showToast(`${newTeachers.length} Guru berhasil diimpor & disimpan!`);
        } catch (e) {
          showToast("Format paste tidak sesuai. Pastikan urutan Excel benar.");
        }
      };

      const handleSyncCSV = async () => {
        if(!csvUrl) return;
        setLoadingCsv(true);
        try {
          const res = await fetch(csvUrl);
          if(!res.ok) throw new Error("Gagal mengambil data");
          const text = await res.text();
          const rows = parseCSV(text).filter(r => r && r.some(c => c.trim() !== ''));
          
          if (rows.length > 1) {
            const header = rows[0].map(h => h.trim().toUpperCase());
            const iNama = header.findIndex(h => h.includes('NAMA GURU') || h.includes('NAMA'));
            const iNip = header.findIndex(h => h.includes('NIP'));
            const iWali = header.findIndex(h => h.includes('WALI KELAS') || h.includes('ROMBEL'));
            const iMapel = header.findIndex(h => h.includes('MAPEL') || h.includes('MATA PELAJARAN'));
            const iUser = header.findIndex(h => h.includes('USERNAME') || h.includes('AKUN'));

            const parsed = rows.slice(1).map((row, idx) => {
               const tName = iNama !== -1 ? row[iNama] : `Guru ${idx+1}`;
               if (!tName || tName.trim() === '') return null;
               
               return {
                  id: Date.now() + idx,
                  nama: tName.trim(),
                  nip: iNip !== -1 && row[iNip] ? row[iNip] : '-',
                  waliKelas: iWali !== -1 && row[iWali] ? row[iWali] : '-',
                  mapel: iMapel !== -1 && row[iMapel] ? row[iMapel] : '-',
                  username: iUser !== -1 && row[iUser] ? row[iUser] : tName.toLowerCase().replace(/\s+/g, ''),
                  ket: 'Aktif'
               };
            }).filter(t => t !== null);

            if (parsed.length > 0) {
               showConfirm(`Tarik CSV menemukan ${parsed.length} guru. Data ini akan MENGGANTIKAN data guru saat ini. Lanjutkan?`, () => {
                  setTeachers(parsed);
                  syncToCloud('teachers', parsed, profil.tahunAjaran);
                  showToast(`Berhasil Sinkronisasi ${parsed.length} Data Guru!`);
               });
            } else {
               throw new Error("Data kosong atau format kolom tidak dikenali.");
            }
          }
        } catch (e) {
           showToast("Gagal menarik data. Pastikan link Google Sheets valid, publik (format CSV).");
        }
        setLoadingCsv(false);
      };

      const deleteTeacher = (id) => {
        showConfirm('Yakin ingin menghapus data guru ini?', () => {
           const updated = teachers.filter(t => t.id !== id);
           setTeachers(updated);
           syncToCloud('teachers', updated, profil.tahunAjaran);
           showToast('Data guru berhasil dihapus!');
        });
      };

      return (
        <div className="space-y-6">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white/90 backdrop-blur-sm p-6 rounded-3xl border border-slate-100 shadow-sm">
            <div>
              <h2 className="text-xl font-bold text-slate-800">Manajemen Data Guru</h2>
              <p className="text-sm font-medium text-slate-500">Kelola akun login (Username) dan penugasan guru.</p>
            </div>
            <button onClick={() => setShowPaste(!showPaste)} className="bg-primary hover:bg-primaryHover text-white px-5 py-3 rounded-xl text-sm font-bold flex items-center gap-2 shadow-md transition-all">
              <Plus className="text-sm" /> Import Paste Excel
            </button>

    function AdminDataSiswa({ allStudents, setAllStudents, profil, showToast, teachers }) {
      const [csvUrl, setCsvUrl] = useState("https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9NDKstrj0d9JH7PSMGc4X9ZP1JEarvqoXhF2BZcesqs52oW_jYNKd_fI832uYg/pub?gid=1632329455&single=true&output=csv");
      const [loading, setLoading] = useState(false);

      const handleSync = async () => {
        setLoading(true);
        try {
          const res = await fetch(csvUrl);
          if(!res.ok) throw new Error("Gagal mengambil data");
          
          const text = await res.text();
          // Filter baris kosong agar baris data pertama tidak terlewat
          const rows = parseCSV(text).filter(r => r && r.some(c => c.trim() !== ''));
          
          if (rows.length > 1) {
            const header = rows[0].map(h => h.trim().toUpperCase());
            const getCol = (hName) => header.findIndex(h => h === hName.toUpperCase() || h.includes(hName.toUpperCase()));
            
            const iNama = getCol('NAMA SISWA');
            const iNisn = getCol('NISN');
            const iNis = header.findIndex(h => h === 'NIS' || h.includes('NOMOR INDUK') || h.includes('NO INDUK') || h.includes('NO. INDUK'));
            const iRombel = getCol('ROMBEL SD');
            const iTempatLahir = getCol('TEMPAT TANGGAL LAHIR');
            const iJK = getCol('JENIS KELAMIN');
            const iNamaAyah = getCol('NAMA AYAH');
            const iNamaIbu = getCol('NAMA IBU');
            const iKerjaAyah = getCol('PEKERJAAN AYAH');
            const iKerjaIbu = getCol('PEKERJAAN IBU');
            const iDusun = getCol('DUSUN');
            const iDesa = getCol('DESA');
            const iKec = getCol('KECAMATAN');
            const iKab = getCol('KABUPATEN');
            const iAgama = getCol('AGAMA');

            const parsed = rows.slice(1).map((row, idx) => {
              const sName = iNama !== -1 ? row[iNama] : `Siswa ${idx+1}`;
              if (!sName || sName.trim() === '') return null;
              const nisnVal = iNisn !== -1 ? row[iNisn] : `00${idx}`;
              
              const existing = allStudents.find(old => old.nama === sName.trim() || old.nisn === nisnVal);
              const sId = existing ? existing.id : `S-${Date.now()}-${idx}`;

              return {
                id: sId,
                nama: sName.trim(),
                nisn: nisnVal,
                nis: iNis !== -1 ? row[iNis] : '-',
                rombelSD: iRombel !== -1 ? row[iRombel] : '-',
                tempatTanggalLahir: iTempatLahir !== -1 ? row[iTempatLahir] : '-',
                jenisKelamin: iJK !== -1 ? row[iJK] : '-',
                agama: iAgama !== -1 && row[iAgama] ? row[iAgama] : 'Islam',
                namaAyah: iNamaAyah !== -1 ? row[iNamaAyah] : '-',
                namaIbu: iNamaIbu !== -1 ? row[iNamaIbu] : '-',
                pekerjaanAyah: iKerjaAyah !== -1 ? row[iKerjaAyah] : '-',
                pekerjaanIbu: iKerjaIbu !== -1 ? row[iKerjaIbu] : '-',
                alamat: {
                  jalan: iDusun !== -1 ? row[iDusun] : '-',
                  desa: iDesa !== -1 ? row[iDesa] : '-',
                  kecamatan: iKec !== -1 ? row[iKec] : '-',
                  kabupaten: iKab !== -1 ? row[iKab] : '-',
                }
              };
            }).filter(s => s !== null); 
            
            if (parsed.length > 0) {
              setAllStudents(parsed);
              showToast(`Berhasil Sinkronisasi Master Data ${parsed.length} Siswa!`);
              syncToCloud('allStudents', parsed, profil.tahunAjaran);
            } else {
              throw new Error("Data kosong atau format salah");
            }
          }
        } catch (e) {
           console.error(e);
           showToast("Gagal menarik data. Pastikan link Google Sheets valid dan publik.");
        }
        setLoading(false);
      };
      
      return (
        <div className="bg-white/90 backdrop-blur-sm p-6 sm:p-8 rounded-[2rem] border border-slate-100 shadow-sm">
          <div className="w-12 h-12 sm:w-16 sm:h-16 bg-blue-50 text-blue-600 rounded-xl sm:rounded-2xl flex items-center justify-center mb-4 sm:mb-6"><RefreshCw className="text-xl sm:text-2xl"/></div>
          <h2 className="font-extrabold text-xl sm:text-2xl text-slate-800 mb-2">Sinkronisasi Database Induk Siswa</h2>
          <p className="text-slate-500 font-medium text-xs sm:text-sm mb-6 sm:mb-8">Data Master ditarik dari Spreadsheet. Nanti Guru Wali Kelas akan menarik datanya masing-masing berdasarkan Rombel SD.</p>
          
          <div className="flex flex-col md:flex-row gap-3 sm:gap-4 mb-8">
            <div className="flex-1 relative">
               <LinkIcon className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm" />
               <input type="text" className="w-full pl-10 pr-3 py-3 sm:py-4 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl text-xs sm:text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none" value={csvUrl} onChange={e=>setCsvUrl(e.target.value)} placeholder="https://docs.google.com/..." />
            </div>
            <button onClick={handleSync} disabled={loading} className="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 sm:px-8 py-3 sm:py-4 rounded-xl sm:rounded-2xl text-xs sm:text-sm font-bold shadow-md flex items-center justify-center gap-2 disabled:opacity-70 whitespace-nowrap">
              {loading ? <RefreshCw className="animate-spin" /> : <Download />}
              {loading ? 'Membaca Data...' : 'Sinkron & Simpan Master'}
            </button>
          </div>

          <div className="border border-slate-200 rounded-2xl overflow-hidden">
             <div className="bg-slate-50 p-4 border-b border-slate-200 font-bold text-slate-700 text-sm flex justify-between items-center">
                <span>Tinjauan Data Siswa ({allStudents.length})</span>
             </div>
             <div className="overflow-x-auto max-h-[50vh]" style={{scrollbarWidth: 'thin'}}>
               <table className="w-full text-left text-[10px] sm:text-sm table-fixed min-w-[700px] break-words">
                 <thead className="bg-slate-100 text-slate-600 sticky top-0 shadow-sm">
                    <tr>
                      <th className="p-2 sm:p-3 w-12 text-center border-r border-slate-200">No</th>
                      <th className="p-2 sm:p-3 w-[15%] border-r border-slate-200">NISN</th>
                      <th className="p-2 sm:p-3 w-[15%] border-r border-slate-200">NIS</th>
                      <th className="p-2 sm:p-3 w-[30%] border-r border-slate-200">Nama Siswa</th>
                      <th className="p-2 sm:p-3 w-[10%] text-center border-r border-slate-200">Kelas</th>
                      <th className="p-2 sm:p-3 w-[20%] border-r border-slate-200">Wali Kelas</th>
                    </tr>
                 </thead>
                 <tbody className="divide-y divide-slate-100 bg-white">
                    {allStudents.map((s, i) => {
                       const w = teachers.find(t => t.waliKelas === s.rombelSD);
                       return (
                         <tr key={s.id} className="hover:bg-blue-50/30">
                           <td className="p-2 sm:p-3 text-center text-slate-400 font-bold border-r border-slate-100">{i+1}</td>

                           <td className="p-2 sm:p-3 text-slate-600 border-r border-slate-100">{s.nis}</td>
                           <td className="p-2 sm:p-3 font-bold text-slate-800 border-r border-slate-100">{s.nama}</td>
                           <td className="p-2 sm:p-3 text-center border-r border-slate-100"><span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded font-bold">{s.rombelSD}</span></td>
                           <td className="p-2 sm:p-3 text-slate-600 text-xs border-r border-slate-100">{w ? w.nama : '-'}</td>
                         </tr>
                       )
                    })}
                    {allStudents.length === 0 && <tr><td colSpan="6" className="p-8 text-center font-bold text-slate-400">Data belum disinkronisasi.</td></tr>}
                 </tbody>
               </table>
             </div>
          </div>
        </div>
      );

    function AdminCetakAdministrasi({ activeContext, calculateNA, showToast }) {
       const [activeTab, setActiveTab] = useState('juara_kelas');
       
       // States for Juara Kelas & Tanda Tangan
       const [rombelKelas, setRombelKelas] = useState('');
       const rombelOptions = [...new Set(activeContext.allStudents.map(s => s.rombelSD))].filter(r => r && r !== '-').sort();

       // States for Juara Umum
       const [tingkat, setTingkat] = useState('1');

       // HELPER: Generate Leger Data
       const getLegerData = (studentsList) => {
          return studentsList.map(s => {
             let total = 0;
             activeContext.mapel.forEach(m => {
                let na = calculateNA(m, s.id, activeContext.materiGuru, activeContext.studentGrades) || 0;
                total += na;
             });
             let avg = activeContext.mapel.length > 0 ? (total / activeContext.mapel.length).toFixed(2) : 0;
             return { ...s, total, avg };
          }).sort((a, b) => b.total - a.total);
       };

       const handleCetakJuaraKelas = () => {
          if(!rombelKelas) { showToast('Pilih Kelas Terlebih Dahulu'); return; }
          const studentsInClass = activeContext.allStudents.filter(s => s.rombelSD === rombelKelas);
          if(studentsInClass.length === 0) { showToast('Tidak ada siswa di kelas ini'); return; }

          const ranked = getLegerData(studentsInClass).slice(0, 10); // Ambil 10 besar
          const w = activeContext.teachers.find(t => t.waliKelas === rombelKelas);
          const waliName = w ? w.nama : '................................';

          const rows = ranked.map((s, i) => `
             <tr>
               <td class="border border-black p-2 text-center">${i+1}</td>
               <td class="border border-black p-2 font-bold uppercase">${s.nama}</td>
               <td class="border border-black p-2 text-center">${s.nisn}</td>
               <td class="border border-black p-2 text-center font-bold">${Math.round(s.total)}</td>
               <td class="border border-black p-2 text-center">${s.avg}</td>
               <td class="border border-black p-2 text-center font-bold text-xl">Ke-${i+1}</td>
             </tr>
          `).join('');

          const html = `
             <html><head><title>Pengumuman Juara Kelas</title>

    function GuruPengaturanMapel({ mapelList, activeMapelList, setGuruMapelConfig, username, profil, showToast, isAppLocked, appConfig }) {
      const [localMapel, setLocalMapel] = useState(activeMapelList);

      const toggleMapel = (m) => {
        if(isAppLocked) return;
        if(localMapel.includes(m)) {
          setLocalMapel(localMapel.filter(item => item !== m));
        } else {
          setLocalMapel([...localMapel, m]);
        }
      };

      const handleSave = () => {
        setGuruMapelConfig(prev => {
           const updated = {...prev, [username]: localMapel};
           syncToCloud('guruMapelConfig', updated, profil.tahunAjaran);
           return updated;
        });
        showToast('Pengaturan Mapel Berhasil Disimpan!');
      };

      return (
        <div className="bg-white/90 backdrop-blur-sm p-6 sm:p-8 rounded-[2rem] shadow-sm border border-slate-100 max-w-2xl">

              </svg>

                <span className="text-xl sm:text-2xl font-black text-slate-800">{progress}%</span>
              </div>
            </div>
            <div className="text-center md:text-left">
              <h3 className="text-lg sm:text-xl font-extrabold text-slate-800 mb-1 sm:mb-2">Progress Pengisian Nilai</h3>
              <p className="text-slate-500 font-medium text-xs sm:text-sm mb-3 sm:mb-4">Perhitungan diakumulasi dari total <b>{students.length} Siswa</b> pada <b>{mapelList.length} Mata Pelajaran</b>.</p>
              <div className="flex gap-1.5 sm:gap-2 flex-wrap justify-center md:justify-start">
                {mapelList.map(m => {
                  let filledForMapel = 0;
                  students.forEach(s => { if(calculateNA(m, s.id) !== null) filledForMapel++; });
                  const isDone = students.length > 0 && filledForMapel === students.length;
                  
                  return <span key={m} className={`px-2 py-1 sm:px-3 sm:py-1 rounded-md sm:rounded-lg text-[10px] sm:text-xs font-bold ${isDone ? 'bg-primaryLight text-primaryHover' : 'bg-slate-100 text-slate-500'}`}>{m}</span>
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function GuruTarikSiswa({ allStudents, guruRombelConfig, setGuruRombelConfig, username, profil, teachers, showToast, isAppLocked, appConfig }) {
      const [selectedRombel, setSelectedRombel] = useState(guruRombelConfig[username] || '');
      
      const rombelOptions = [...new Set(allStudents.map(s => s.rombelSD))].filter(r => r && r !== '-').sort();

      const handleTarik = () => {
        if(!selectedRombel) { showToast('Pilih Rombel Terlebih Dahulu!'); return; }
        
        setGuruRombelConfig(prev => {
          const updated = { ...prev, [username]: selectedRombel };
          syncToCloud('guruRombelConfig', updated, profil.tahunAjaran);
          return updated;
        });

        showToast(`Data Siswa dari Rombel ${selectedRombel} Berhasil Terkunci/Disimpan!`);
      };

      return (
        <div className="text-center p-8 sm:p-12 bg-white/90 backdrop-blur-sm rounded-[2rem] shadow-sm border border-slate-100 max-w-2xl mx-auto">
          {isAppLocked && <div className="text-left"><AppLockBanner appConfig={appConfig} /></div>}
          <div className="w-16 h-16 sm:w-24 sm:h-24 bg-primaryLight text-primary rounded-[2rem] flex items-center justify-center mx-auto mb-4 sm:mb-6"><RefreshCw className="text-2xl sm:text-4xl" /></div>
          <h2 className="font-extrabold text-lg sm:text-2xl text-slate-800 mb-2 sm:mb-4">Pilih & Kunci Rombel Aktif</h2>
          <p className="text-slate-500 font-medium text-xs sm:text-sm mb-6 sm:mb-8">Pilih kelas yang Anda ampu, dan datanya akan <b>dikunci otomatis secara permanen</b>. Saat Refresh, data siswa Anda tidak akan hilang dan langsung terisi.</p>
          
          {allStudents.length === 0 ? (
            <div className="bg-red-50 text-red-700 p-4 rounded-xl font-bold mb-6 text-sm">Database Induk Kosong! Hubungi Admin untuk Sync CSV.</div>
          ) : (
            <div className="flex flex-col sm:flex-row gap-3 sm:gap-4 mb-6 sm:mb-8">
               <select disabled={isAppLocked} className="flex-1 p-3 sm:p-4 border border-slate-200 rounded-xl sm:rounded-2xl outline-none focus:ring-2 focus:ring-primary font-bold bg-slate-50 text-sm disabled:opacity-50" value={selectedRombel} onChange={e=>setSelectedRombel(e.target.value)}>
                 <option value="">-- Pilih Rombel --</option>
                 {rombelOptions.map(r => {

               <button onClick={handleTarik} disabled={isAppLocked} className="w-full sm:w-auto bg-primary hover:bg-primaryHover text-white px-6 sm:px-8 py-3 sm:py-4 rounded-xl sm:rounded-2xl font-bold shadow-md transition-all whitespace-nowrap text-sm sm:text-base disabled:opacity-50">Kunci Pilihan Siswa</button>
            </div>
          )}

          {guruRombelConfig[username] && (
            <div className="bg-blue-50 text-blue-800 p-3 sm:p-4 rounded-xl sm:rounded-2xl font-bold text-xs sm:text-sm border border-blue-100 shadow-sm">
              ✅ Anda saat ini sedang mengelola / mengisi data siswa Rombel <span className="underline bg-blue-200 px-2 py-0.5 rounded">{guruRombelConfig[username]}</span>.
            </div>
          )}
        </div>
      );
    }

    function GuruInputMateri({ mapelList, materiGuru, setMateriGuru, profil, showToast, isAppLocked, appConfig }) {
      const [selectedMapel, setSelectedMapel] = useState(mapelList[0] || '');
      const [materiInput, setMateriInput] = useState(Array(7).fill(''));

      useEffect(() => { setMateriInput(materiGuru[selectedMapel] || Array(7).fill('')); }, [selectedMapel, materiGuru]);

      const handleSave = () => {
        const updatedMateri = materiInput.map(m => m.trim());
        setMateriGuru(prev => {
          const stateUpdate = { ...prev, [selectedMapel]: updatedMateri };
          syncToCloud('materiGuru', stateUpdate, profil.tahunAjaran);
          return stateUpdate;
        });
        showToast(`Materi untuk ${selectedMapel} berhasil disimpan!`);
      };

      return (
        <div className="bg-white/90 backdrop-blur-sm p-6 sm:p-8 rounded-[2rem] shadow-sm border border-slate-100">
          {isAppLocked && <AppLockBanner appConfig={appConfig} />}
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-8 gap-4 border-b border-slate-100 pb-4 sm:pb-6">
            <div>
              <h2 className="font-extrabold text-lg sm:text-2xl text-slate-800 mb-1">Input Materi / Deskripsi</h2>
              <p className="text-slate-500 font-medium text-[10px] sm:text-sm">Deskripsi ini akan dirangkai otomatis pada halaman Rapor.</p>
            </div>
            <select className="p-3 sm:p-3.5 border border-slate-200 rounded-xl font-bold bg-slate-50 text-slate-800 outline-none focus:ring-2 focus:ring-primary w-full sm:w-auto text-xs sm:text-sm" value={selectedMapel} onChange={e=>setSelectedMapel(e.target.value)}>
              {mapelList.map(m => <option key={m}>{m}</option>)}
            </select>
          </div>
          
          {mapelList.length === 0 ? <p className="font-bold text-red-500 text-sm">Anda tidak mengampu Mata Pelajaran apapun.</p> : (
            <>
              <div className="space-y-3 sm:space-y-4 max-w-3xl">
                {materiInput.map((val, idx) => (
                  <div key={idx} className="flex items-center gap-2 sm:gap-4">
                     <span className="w-8 h-8 sm:w-12 sm:h-12 flex items-center justify-center bg-primaryLight text-primaryHover font-extrabold rounded-lg sm:rounded-xl shrink-0 text-xs sm:text-base">M{idx+1}</span>
                     <input type="text" disabled={isAppLocked} className="w-full p-3 sm:p-4 bg-slate-50 border border-slate-200 rounded-lg sm:rounded-xl text-xs sm:text-sm font-medium focus:ring-2 focus:ring-primary outline-none transition-all disabled:opacity-50" placeholder={`Contoh: bilangan cacah sampai 1.000...`} value={val} onChange={(e) => {
                       const newM = [...materiInput]; newM[idx] = e.target.value; setMateriInput(newM);
                     }} />
                  </div>
                ))}
              </div>
              <button onClick={handleSave} disabled={isAppLocked} className="mt-6 sm:mt-8 w-full sm:w-auto bg-primary hover:bg-primaryHover text-white px-6 sm:px-8 py-3 sm:py-4 rounded-xl sm:rounded-2xl font-bold shadow-md flex items-center justify-center gap-2 text-sm sm:text-base disabled:opacity-50"><Save /> Simpan Materi</button>
            </>
          )}
        </div>
      );
    }

    function GuruInputNilai({ mapelList, materiGuru, studentGrades, setStudentGrades, students, calculateNA, profil, showToast, showConfirm, isAppLocked, appConfig }) {
      const [selectedMapel, setSelectedMapel] = useState(mapelList[0] || '');
      const [expandedRowId, setExpandedRowId] = useState(null); // Menyimpan ID siswa yang deskripsinya sedang dibuka

      const grades = studentGrades[selectedMapel] || {};
      const currentMateri = (materiGuru[selectedMapel] || []).filter(m => m !== '');

      const handleChange = (studentId, field, val) => {
        if(isAppLocked) return;
        const valFloat = val === '' ? undefined : parseFloat(val);
        setStudentGrades(prev => ({
          ...prev, 
          [selectedMapel]: {
            ...(prev[selectedMapel] || {}),
            [studentId]: { ...((prev[selectedMapel] || {})[studentId] || {}), [field]: valFloat }
          }
        }));
      };

      const handleSave = () => {
        syncToCloud('studentGrades', studentGrades, profil.tahunAjaran);
        showToast(`Semua Nilai Akademik Mapel ${selectedMapel} Disimpan!`);
      };

      const handleReset = () => {
        if(isAppLocked) return;
        showConfirm(`PERINGATAN! Yakin ingin KOSONGKAN/HAPUS seluruh nilai siswa pada mata pelajaran ${selectedMapel}? Data tidak dapat dikembalikan.`, () => {
          setStudentGrades(prev => {
            const updated = { ...prev };
            delete updated[selectedMapel];
            syncToCloud('studentGrades', updated, profil.tahunAjaran);
            return updated;
          });
          showToast(`Data Nilai ${selectedMapel} Berhasil Dihapus!`);
        });
      };

      const generateKeterangan = (s, studentGradesLocal) => {
        if (!studentGradesLocal || currentMateri.length === 0) return '';
        let maxVal = -1, minVal = 101, maxIdx = -1, minIdx = -1, countMateri = 0;
        currentMateri.forEach((_, idx) => {
          const val = studentGradesLocal[`m${idx}`];
          if (val !== undefined && !isNaN(val)) {
            if (val > maxVal) { maxVal = val; maxIdx = idx; }
            if (val < minVal) { minVal = val; minIdx = idx; }
            countMateri++;
          }
        });
        if (countMateri === 0) return '-';

        let ket = `Menunjukkan penguasaan yang sangat baik dalam ${currentMateri[maxIdx]}`;
        if (currentMateri.length > 1 && maxIdx !== minIdx) {
            ket += `\nPerlu bimbingan dalam ${currentMateri[minIdx]}`;
        }
        return ket;
      };

      return (
        <div className="bg-white/90 backdrop-blur-sm p-4 sm:p-8 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col h-full">
          {isAppLocked && <AppLockBanner appConfig={appConfig} />}
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 sm:mb-6 gap-3 sm:gap-4 border-b border-slate-100 pb-4">
            <div>
              <h2 className="font-extrabold text-lg sm:text-2xl text-slate-800">Input Nilai Formatif & Sumatif</h2>
              <p className="text-slate-500 font-medium text-[10px] sm:text-sm mt-1">Gunakan mode lanskap atau tutup menu samping di HP.</p>
            </div>
            <div className="flex gap-2 w-full md:w-auto">
              <select className="p-2 sm:p-3.5 border border-slate-200 rounded-xl font-bold bg-primaryLight text-primaryHover outline-none focus:ring-2 focus:ring-primary flex-1 md:w-64 text-xs sm:text-sm" value={selectedMapel} onChange={e=>setSelectedMapel(e.target.value)}>
                {mapelList.map(m => <option key={m}>{m}</option>)}
              </select>
              <button onClick={handleReset} disabled={isAppLocked} className="bg-red-50 text-red-600 hover:bg-red-100 px-3 py-2 sm:px-4 sm:py-3.5 rounded-xl font-bold transition-all flex items-center justify-center shrink-0 disabled:opacity-50" title="Hapus Semua Nilai Mapel Ini"><Trash2 /></button>
            </div>
          </div>

          {currentMateri.length === 0 ? (
            <div className="bg-amber-50 text-amber-800 p-4 sm:p-6 rounded-2xl border border-amber-200 font-bold flex items-center gap-3 sm:gap-4 text-xs sm:text-base">
              <span className="text-xl sm:text-3xl">⚠️</span>
              <p>Anda belum mengisi Materi/Deskripsi untuk mata pelajaran <u>{selectedMapel || 'ini'}</u>. Silakan isi di menu <b>Input Deskripsi/TP</b>.</p>
            </div>
          ) : students.length === 0 ? (
            <div className="bg-red-50 text-red-800 p-4 sm:p-6 rounded-2xl border border-red-200 font-bold text-xs sm:text-base">Silahkan pilih / kunci Rombel Kelas terlebih dahulu di menu "Pilih / Tarik Siswa".</div>
          ) : (
            <>
              <div className="w-full border border-slate-200 rounded-xl sm:rounded-2xl pb-2 table-container overflow-x-auto">
                <table className="w-full text-left table-fixed border-collapse text-[8px] sm:text-sm min-w-max">
                  <thead className="bg-slate-50 border-b border-slate-200">
                    <tr>
                      <th className="p-1 sm:px-4 sm:py-4 text-center border-r border-slate-200 w-[5%] min-w-[40px] leading-tight bg-slate-50 whitespace-nowrap" rowSpan={2}>No</th>
                      <th className="p-1 sm:px-4 sm:py-4 border-r border-slate-200 w-[25%] min-w-[150px] leading-tight bg-slate-50 whitespace-nowrap" rowSpan={2}>NAMA SISWA</th>
                      <th className="p-1 sm:px-4 sm:py-2 text-center bg-primaryLight border-b border-primary/20 font-extrabold text-primaryHover leading-tight whitespace-nowrap" colSpan={currentMateri.length}>NILAI MATERI / FORMATIF</th>
                      <th className="p-1 sm:px-2 sm:py-3 text-center bg-blue-50 border-x border-blue-100 min-w-[50px] leading-tight bg-blue-50 whitespace-nowrap" rowSpan={2}>STS</th>
                      <th className="p-1 sm:px-2 sm:py-3 text-center bg-blue-50 border-r border-blue-100 min-w-[50px] leading-tight bg-blue-50 whitespace-nowrap" rowSpan={2}>SAS</th>
                      <th className="p-1 sm:px-2 sm:py-3 text-center bg-primary text-white font-extrabold border-r min-w-[50px] leading-tight whitespace-nowrap" rowSpan={2}>N.A</th>
                      <th className="p-1 sm:px-4 sm:py-3 min-w-[100px] leading-tight bg-slate-50 whitespace-nowrap text-center" rowSpan={2}>DESKRIPSI CAPAIAN</th>
                    </tr>
                    <tr>
                      {currentMateri.map((m, i) => <th key={i} className="p-0.5 sm:px-2 sm:py-2 text-center text-[7px] sm:text-xs font-bold bg-primaryLight/50 border-r border-primary/20 min-w-[50px] whitespace-nowrap" title={m}>M{i+1}</th>)}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {students.map((s, i) => {
                      const sg = grades[s.id] || {};
                      const calcNA = calculateNA(selectedMapel, s.id);
                      const ket = generateKeterangan(s, sg);
                      const isExpanded = expandedRowId === s.id;

                      return (
                        <React.Fragment key={s.id}>
                          <tr className="hover:bg-slate-50 transition-colors">
                            <td className="p-1 sm:px-4 sm:py-3 text-center font-bold text-slate-400 border-r border-slate-100">{i+1}</td>
                            <td className="p-1 sm:px-4 sm:py-3 font-extrabold text-slate-800 border-r border-slate-100 leading-tight truncate max-w-[150px]">{s.nama}</td>
                            {currentMateri.map((_, idx) => (
                              <td key={idx} className="p-0.5 sm:p-1 border-r border-slate-100 bg-primaryLight/10">
                                <input type="number" min="0" max="100" disabled={isAppLocked} className="w-full min-w-0 p-1 sm:p-1.5 border border-slate-200 rounded sm:rounded-lg text-center text-[10px] sm:text-sm font-bold text-slate-700 focus:ring-1 focus:ring-primary outline-none disabled:bg-slate-100" value={sg[`m${idx}`] ?? ''} onChange={e=>handleChange(s.id, `m${idx}`, e.target.value)} />
                              </td>
                            ))}
                            <td className="p-0.5 sm:p-1 text-center bg-blue-50/20 border-x border-slate-100">
                              <input type="number" min="0" max="100" disabled={isAppLocked} className="w-full min-w-0 p-1 sm:p-1.5 border border-slate-200 rounded sm:rounded-lg text-center text-[10px] sm:text-sm font-bold text-slate-700 focus:ring-1 focus:ring-blue-500 outline-none disabled:bg-slate-100" value={sg.sts ?? ''} onChange={e=>handleChange(s.id, 'sts', e.target.value)}/>
                            </td>
                            <td className="p-0.5 sm:p-1 text-center bg-blue-50/20 border-r border-slate-100">
                              <input type="number" min="0" max="100" disabled={isAppLocked} className="w-full min-w-0 p-1 sm:p-1.5 border border-slate-200 rounded sm:rounded-lg text-center text-[10px] sm:text-sm font-bold text-slate-700 focus:ring-1 focus:ring-blue-500 outline-none disabled:bg-slate-100" value={sg.sas ?? ''} onChange={e=>handleChange(s.id, 'sas', e.target.value)}/>
                            </td>
                            <td className="p-1 sm:px-2 sm:py-3 text-center font-black text-primaryHover bg-primaryLight border-r border-primary/20 text-[10px] sm:text-base">{calcNA !== null ? Math.round(calcNA) : '0'}</td>
                            
                            {/* KOLOM DESKRIPSI (DIBUAT TOMBOL) */}
                            <td className="p-1 sm:px-2 sm:py-2 text-center align-middle border-slate-100">
                               {calcNA !== null ? (
                                  <button onClick={() => setExpandedRowId(isExpanded ? null : s.id)} className={`w-full py-1.5 rounded-lg text-[9px] sm:text-xs font-bold transition-all ${isExpanded ? 'bg-primary text-white' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'}`}>
                                     {isExpanded ? 'Tutup' : 'Lihat Capaian'}
                                  </button>
                               ) : <span className="text-slate-400">-</span>}
                            </td>
                          </tr>
                          
                          {/* BARIS EXTRA UNTUK DESKRIPSI JIKA DIBUKA */}
                          {isExpanded && calcNA !== null && (
                             <tr className="bg-yellow-50/50">
                               <td colSpan={currentMateri.length + 5} className="p-3 border-b border-yellow-100 text-xs text-yellow-800 italic leading-relaxed whitespace-normal break-words border-r">
                                  <b>Deskripsi Capaian:</b><br/>
                                  {ket.split('\n').map((str,k)=><div key={k}>{str}</div>)}
                               </td>
                             </tr>
                          )}
                        </React.Fragment>
                      )
                    })}
                  </tbody>
                </table>
              </div>
              <button onClick={handleSave} disabled={isAppLocked} className="mt-4 sm:mt-6 w-full sm:w-auto bg-primary hover:bg-primaryHover text-white px-6 sm:px-8 py-3 sm:py-4 rounded-xl sm:rounded-2xl font-bold flex items-center justify-center gap-2 shadow-md transition-all text-sm sm:text-base disabled:opacity-50"><Save /> Simpan Data Nilai</button>
            </>
          )}
        </div>
      );
    }

    function GuruInputAbsensi({ students, absensi, setAbsensi, profil, showToast, showConfirm, isAppLocked, appConfig }) {
      const updateAbsen = (id, field, val) => {
        if(isAppLocked) return;
        const num = parseInt(val) || 0;
        setAbsensi(p => ({...p, [id]: {...(p[id]||{sakit:0, izin:0, alfa:0}), [field]: num}}));
      };

      const handleSave = () => {
        syncToCloud('absensi', profil.tahunAjaran);
        showToast('Data Kehadiran Disimpan!');
      };

      const handleReset = () => {
        if(isAppLocked) return;
        showConfirm('Yakin ingin KOSONGKAN/HAPUS seluruh Absensi untuk rombel ini?', () => {
          setAbsensi({});
          syncToCloud('absensi', {}, profil.tahunAjaran);
          showToast('Data Absensi berhasil dihapus!');
        });
      };

      return (
        <div className="bg-white/90 backdrop-blur-sm p-4 sm:p-8 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col h-full">
          {isAppLocked && <AppLockBanner appConfig={appConfig} />}
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 sm:mb-8 border-b border-slate-100 pb-4 sm:pb-6 gap-3 sm:gap-4">
            <div>
               <h2 className="font-extrabold text-lg sm:text-2xl text-slate-800">Input Data Kehadiran</h2>
               <p className="text-slate-500 font-medium text-[10px] sm:text-sm mt-1">Catatan Wali Kelas di Rapor kini dihasilkan otomatis oleh sistem berdasarkan Nilai Rata-rata.</p>
            </div>
            <div className="flex gap-2 w-full sm:w-auto">
               <button onClick={handleReset} disabled={isAppLocked} className="bg-red-50 hover:bg-red-100 text-red-600 px-3 py-2 sm:px-4 sm:py-3 rounded-xl sm:rounded-2xl font-bold flex justify-center items-center disabled:opacity-50"><Trash2 /></button>
               <button onClick={handleSave} disabled={isAppLocked} className="flex-1 sm:flex-none justify-center bg-primary text-white px-4 py-2 sm:px-6 sm:py-3 rounded-xl sm:rounded-2xl text-xs sm:text-base font-bold flex items-center gap-2 shadow-md disabled:opacity-50"><Save /> Simpan</button>
            </div>
          </div>
          
          {students.length === 0 ? <p className="font-bold text-red-500 text-xs sm:text-base">Silahkan pilih / kunci Rombel Kelas terlebih dahulu di menu "Pilih / Tarik Siswa".</p> : (
            <div className="w-full border border-slate-200 rounded-xl sm:rounded-2xl pb-1 table-container overflow-x-auto">
              <table className="w-full text-left table-fixed border-collapse text-[10px] sm:text-sm min-w-max">
                <thead className="bg-slate-50 border-b border-slate-200 text-slate-600 nowrap-header">
                  <tr>
                    <th className="p-2 sm:px-4 sm:py-4 border-r text-center w-10 sm:w-12 leading-tight bg-slate-50">No</th>
                    <th className="p-2 sm:px-4 sm:py-4 border-r min-w-[150px] leading-tight bg-slate-50">Nama Siswa</th>
                    <th className="p-2 sm:py-4 text-center border-r min-w-[60px] leading-tight bg-slate-50">Sakit</th>
                    <th className="p-2 sm:py-4 text-center border-r min-w-[60px] leading-tight bg-slate-50">Izin</th>
                    <th className="p-2 sm:py-4 text-center border-r min-w-[60px] leading-tight bg-slate-50">Alfa</th>
                    <th className="p-2 sm:py-4 text-center border-r bg-primaryLight font-bold text-primaryHover min-w-[60px] leading-tight">Total</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {students.map((s, i) => {
                    const a = absensi[s.id] || {sakit:0, izin:0, alfa:0};
                    const total = (a.sakit||0) + (a.izin||0) + (a.alfa||0);
                    return (
                      <tr key={s.id} className="hover:bg-slate-50">
                        <td className="p-2 sm:px-4 sm:py-4 font-bold text-slate-400 border-r text-center">{i+1}</td>

      const handleUpdate = (id, field, val) => {
        if(isAppLocked) return;
        setKokuData(p => ({...p, [id]: {...(p[id]||{}), [field]: val}}));
      };
      const handleDimensiChange = (index, value) => {
        if(isAppLocked) return;
        const newDimensi = [...dimensiTarget]; newDimensi[index] = value; setDimensiTarget(newDimensi);
      };

      const handleSave = () => {
        syncToCloud('kokuData', kokuData, profil.tahunAjaran);
        syncToCloud('dimensiTarget', dimensiTarget, profil.tahunAjaran);
        showToast('Penilaian P5 disimpan!');
      };

      const handleReset = () => {
        if(isAppLocked) return;
        showConfirm('Yakin ingin KOSONGKAN seluruh data Penilaian Kokurikuler (P5)?', () => {
          setKokuData({});
          syncToCloud('kokuData', {}, profil.tahunAjaran);
          showToast('Data Kokurikuler berhasil dihapus!');
        });
      };

      // Fungsi Pembentuk Narasi P5 Baru sesuai permintaan:
      // "Ananda sudah baik dalam {A & B} dan masih perlu pendampingan dalam {C}"
      const generateKokuText = (row, sName) => {
         let good = [], bad = [];
         if (row.d1 === 'A' || row.d1 === 'B') good.push(dimensiTarget[0]); else bad.push(dimensiTarget[0]);
         if (row.d2 === 'A' || row.d2 === 'B') good.push(dimensiTarget[1]); else bad.push(dimensiTarget[1]);
         if (row.d3 === 'A' || row.d3 === 'B') good.push(dimensiTarget[2]); else bad.push(dimensiTarget[2]);

         let text = `Ananda ${toProperCase(sName)} telah menyelesaikan ${row.jenis}. `;
         
         if (good.length === 3) {
            text += `Ananda sudah sangat baik dalam mengamalkan ${good.join(', ')}.`;
         } else if (bad.length === 3) {
            text += `Ananda masih perlu pendampingan penuh untuk membiasakan ${bad.join(', ')}.`;
         } else {
            text += `Ananda sudah baik dalam ${good.join(' dan ')} dan masih perlu pendampingan dalam ${bad.join(' dan ')}.`;
         }
         return text;
      };

      return (
        <div className="bg-white/90 backdrop-blur-sm p-4 sm:p-8 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col h-full">

                   <tr>
                     {[0,1,2].map(idx => (
                       <th key={idx} className="p-1 sm:p-2 text-center bg-primaryLight/50 border-r border-b border-primary/20 w-[6%] align-top whitespace-nowrap">

                </thead>
                <tbody className="divide-y divide-slate-100">
                   {students.map((s, i) => {

         let text = `Ananda ${toProperCase(sName)} telah menyelesaikan ${row.jenis}. `;
         
         if (good.length === 3) {
            text += `Ananda sudah sangat baik dalam mengamalkan ${good.join(', ')}.`;

            text += `Ananda masih perlu pendampingan penuh untuk membiasakan ${bad.join(', ')}.`;

                <tr><td style="vertical-align: top;">7. Alamat Peserta Didik</td><td style="vertical-align: top;">:</td><td style="text-transform: uppercase; line-height: 1.5; padding-top: 5px;">${fv(s.alamat?.jalan)}, ${fv(s.alamat?.desa)}, KEC. ${fv(s.alamat?.kecamatan)}, ${fv(s.alamat?.kabupaten)}</td></tr>
                <tr><td colspan="3" style="padding-top: 15px;">8. Nama Orang Tua</td></tr>
                <tr><td style="padding-left: 20px; font-weight: bold;">a. Ayah</td><td>:</td><td style="text-transform: uppercase;">${fv(s.namaAyah)}</td></tr>
                <tr><td style="padding-left: 20px; font-weight: bold;">b. Ibu</td><td>:</td><td style="text-transform: uppercase;">${fv(s.namaIbu)}</td></tr>
                <tr><td colspan="3" style="padding-top: 10px;">9. Pekerjaan Orang Tua</td></tr>
                <tr><td style="padding-left: 20px; font-weight: bold;">a. Ayah</td><td>:</td><td style="text-transform: uppercase;">${fv(s.pekerjaanAyah)}</td></tr>
                <tr><td style="padding-left: 20px; font-weight: bold;">b. Ibu</td><td>:</td><td style="text-transform: uppercase;">${fv(s.pekerjaanIbu)}</td></tr>
             </table>

             <div style="display: flex; justify-content: flex-end; align-items: flex-end; margin-top: 40px; padding-right: 20px; position: relative; z-index: 10;">
                <div style="width: 250px; text-align: center;">
                   <p style="margin-bottom: 5px; line-height: 1.2;">${cetakKecamatan}, ${profil.tanggalRaport}</p>
                   <p style="margin-bottom: 2.2cm; font-weight: bold; line-height: 1.2;">Kepala Sekolah</p>
                   <p style="font-weight: bold; text-decoration: underline; text-transform: uppercase; margin: 0; padding: 0; line-height: 1.2;">${profil.kepalaSekolah}</p>
                   ${profil.nip && profil.nip !== '-' ? `<p style="margin: 0; padding: 0; line-height: 1.2;">NIP. ${profil.nip}</p>` : ''}
                </div>
             </div>
          </div>
        `;
      };

      const handlePrint = () => {
        let toPrint = selectedStudent === 'ALL' ? students : students.filter(s => s.id.toString() === selectedStudent);
        if(toPrint.length === 0) { showToast('Siswa kosong, harap tarik/pilih Rombel terlebih dahulu'); return; }
        
        const combinedHTML = `
          <html><head>
            <title>Cetak Sampul</title>
            <style>
              @page { size: A4; margin: 0; }
              @media print { 
                 body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; margin: 0; } 
              }
            </style>
          </head><body style="margin: 0; padding: 0;">
            ${toPrint.map((s, idx) => `
               <div style="${idx !== toPrint.length - 1 ? 'page-break-after: always;' : ''}">
                 ${getSampulHTML(s)}
               </div>
            `).join('')}
            <scr`+`ipt>window.print();</scr`+`ipt>
          </body></html>
        `;
        const win = window.open('', '_blank'); win.document.write(combinedHTML); win.document.close();
      };

      return (
        <div className="bg-white/90 backdrop-blur-sm p-6 sm:p-10 rounded-[2rem] border border-slate-100 shadow-sm max-w-2xl mx-auto text-center mt-6 sm:mt-10">
          <div className="w-16 h-16 sm:w-24 sm:h-24 bg-blue-50 rounded-2xl sm:rounded-[2rem] flex items-center justify-center mx-auto mb-4 sm:mb-6 text-blue-600"><FileBadge className="text-2xl sm:text-4xl"/></div>
          <h2 className="font-extrabold text-xl sm:text-2xl text-slate-800 mb-2">Cetak Sampul Rapor</h2>
          <p className="text-slate-500 font-medium text-xs sm:text-sm mb-6 sm:mb-8">Otomatis mencetak Cover (Sampul 1) dan Identitas Biodata Lengkap (Sampul 2) per siswa.</p>
          
          <select className="w-full p-3 sm:p-4 border border-slate-200 rounded-xl sm:rounded-2xl mb-6 sm:mb-8 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 bg-slate-50 text-xs sm:text-sm" value={selectedStudent} onChange={e=>setSelectedStudent(e.target.value)}>
            <option value="ALL">Cetak Semua Siswa ({students.length} Siswa)</option>
            {students.map(s => <option key={s.id} value={s.id}>{s.nama}</option>)}
          </select>
          
          <button onClick={handlePrint} className="bg-blue-600 hover:bg-blue-700 text-white px-6 sm:px-10 py-3 sm:py-4 rounded-xl sm:rounded-2xl font-bold text-sm sm:text-lg w-full shadow-xl flex items-center justify-center gap-3 transition-all"><ExternalLink /> Buka & Cetak Sampul</button>
        </div>
      );
    }

    // Eksekusi Mounting Aplikasi
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
